# epic-default.formula.toml — default lifecycle graph for epic work.
#
# Design-check → plan → materialize → implement (wave) → review → merge/discard.
# Implementation delegates to subgraph-implement, review to subgraph-review.

name = "epic-default"
description = "Epic lifecycle: design-check → plan → materialize → implement → review → merge"
version = 3
entry = "design-check"

[vars.bead_id]
type = "bead_id"
description = "The epic bead being worked on"
required = true

[vars.base_branch]
description = "Base branch to merge into"
default = "main"

[vars.max_review_rounds]
description = "Maximum review rounds before arbiter escalation"
default = "3"

# --- Workspaces ---

[workspaces.staging]
kind = "staging"
branch = "epic/{vars.bead_id}"
base = "{vars.base_branch}"
scope = "run"
cleanup = "terminal"

# --- Steps ---

[steps.design-check]
kind = "op"
action = "check.design-linked"
title = "Validate design linkage"
with = { auto_create = "true" }
[steps.design-check.lifecycle]
on_start = "in_progress"
on_complete = "in_progress"
on_fail = { event = "Escalated" }

[steps.plan]
kind = "op"
action = "wizard.run"
flow = "epic-plan"
needs = ["design-check"]
title = "Plan epic subtasks"
[steps.plan.lifecycle]
on_start = "in_progress"
on_complete = "in_progress"
on_fail = { event = "Escalated" }

[steps.materialize]
kind = "op"
action = "beads.materialize_plan"
needs = ["plan"]
title = "Verify subtask materialization"
[steps.materialize.lifecycle]
on_start = "in_progress"
on_complete = "in_progress"
on_fail = { event = "Escalated" }

[steps.implement]
kind = "call"
action = "graph.run"
needs = ["materialize"]
workspace = "staging"
graph = "subgraph-implement"
title = "Implement epic subtasks"
[steps.implement.lifecycle]
on_start = "in_progress"
on_complete_match = [
  { when = "outputs.outcome == 'verified'",     status = "awaiting_review" },
  { when = "outputs.outcome == 'build-failed'", status = "awaiting_human" },
]
on_fail = { event = "Escalated" }

[steps.implement-failed]
kind = "op"
action = "bead.finish"
needs = ["implement"]
terminal = true
title = "Implementation failed — escalate"
[steps.implement-failed.with]
status = "escalate"
[steps.implement-failed.when]
all = [{ left = "steps.implement.outputs.outcome", op = "ne", right = "verified" }]
[steps.implement-failed.lifecycle]
on_start = "awaiting_human"
on_complete = "awaiting_human"
on_fail = { event = "Escalated" }

[steps.review]
kind = "call"
action = "graph.run"
needs = ["implement"]
workspace = "staging"
graph = "subgraph-review"
title = "Review epic changes"
[steps.review.when]
all = [{ left = "steps.implement.outputs.outcome", op = "eq", right = "verified" }]
[steps.review.lifecycle]
on_start = "awaiting_review"
on_complete_match = [
  { when = "outputs.verdict == 'approve'",         status = "merge_pending" },
  { when = "outputs.verdict == 'request_changes'", status = "needs_changes" },
]
on_fail = { event = "Escalated" }

[steps.merge]
kind = "op"
action = "git.merge_to_main"
needs = ["review"]
workspace = "staging"
title = "Merge to main"
[steps.merge.with]
strategy = "squash"
[steps.merge.when]
all = [{ left = "steps.review.outputs.outcome", op = "eq", right = "merge" }]
[steps.merge.lifecycle]
on_start = "merge_pending"
on_complete = "closed"
on_fail = { event = "Escalated" }

[steps.close]
kind = "op"
action = "bead.finish"
needs = ["merge"]
terminal = true
title = "Close epic"
[steps.close.with]
status = "closed"
[steps.close.lifecycle]
on_start = "closed"
on_complete = "closed"
on_fail = { event = "Escalated" }

[steps.discard]
kind = "op"
action = "bead.finish"
needs = ["review"]
terminal = true
title = "Discard epic"
[steps.discard.with]
status = "discard"
[steps.discard.when]
all = [{ left = "steps.review.outputs.outcome", op = "eq", right = "discard" }]
[steps.discard.lifecycle]
on_start = "needs_changes"
on_complete = "closed"
on_fail = { event = "Escalated" }
