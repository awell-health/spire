# task-default.formula.toml — default lifecycle graph for task/feature work.
#
# Flow: plan → implement → review → merge/discard
#
# Review is delegated to the subgraph-review sub-graph via graph.run.
# Merge and close are conditional terminal steps based on review outcome.
# Workspace (feature worktree) is declared explicitly.

name = "task-default"
description = "Standard agent work: plan → implement → review → merge"
version = 3
entry = "plan"

[vars.bead_id]
type = "bead_id"
description = "The bead being worked on"
required = true

[vars.base_branch]
description = "Base branch to merge into"
default = "main"

[vars.max_review_rounds]
description = "Maximum review rounds before arbiter escalation"
default = "3"

# --- Workspaces ---

[workspaces.feature]
kind = "owned_worktree"
branch = "feat/{vars.bead_id}"
base = "{vars.base_branch}"
scope = "run"
cleanup = "terminal"

# --- Steps ---

# Step 1: Wizard plans the implementation.
[steps.plan]
kind = "op"
action = "wizard.run"
flow = "task-plan"
title = "Plan implementation"
[steps.plan.lifecycle]
on_start = "in_progress"
on_complete = "in_progress"
on_fail = { event = "Escalated" }

# Step 2: Apprentice implements the plan in an isolated worktree.
[steps.implement]
kind = "op"
action = "wizard.run"
flow = "implement"
needs = ["plan"]
workspace = "feature"
title = "Implement changes"
[steps.implement.lifecycle]
on_start = "in_progress"
on_complete = "awaiting_review"
on_fail = { event = "Escalated" }

# Step 3: Review via the subgraph-review sub-graph (sage → fix/arbiter → merge/discard).
[steps.review]
kind = "call"
action = "graph.run"
needs = ["implement"]
workspace = "feature"
graph = "subgraph-review"
title = "Review changes"
[steps.review.lifecycle]
on_start = "awaiting_review"
on_complete_match = [
  { when = "outputs.verdict == 'approve'",         status = "merge_pending" },
  { when = "outputs.verdict == 'request_changes'", status = "needs_changes" },
]
on_fail = { event = "Escalated" }

# Step 4a: Merge to main — fires when review outcome is merge.
[steps.merge]
kind = "op"
action = "git.merge_to_main"
needs = ["review"]
workspace = "feature"
title = "Merge to main"
[steps.merge.with]
strategy = "squash"
[steps.merge.when]
all = [{ left = "steps.review.outputs.outcome", op = "eq", right = "merge" }]
[steps.merge.lifecycle]
on_start = "merge_pending"
on_complete = "closed"
on_fail = { event = "Escalated" }

# Step 5a: Close bead after successful merge.
[steps.close]
kind = "op"
action = "bead.finish"
needs = ["merge"]
terminal = true
title = "Close bead"
[steps.close.with]
status = "closed"
[steps.close.lifecycle]
on_start = "closed"
on_complete = "closed"
on_fail = { event = "Escalated" }

# Step 4b: Discard — fires when review outcome is discard.
[steps.discard]
kind = "op"
action = "bead.finish"
needs = ["review"]
terminal = true
title = "Discard branch"
[steps.discard.with]
status = "discard"
[steps.discard.when]
all = [{ left = "steps.review.outputs.outcome", op = "eq", right = "discard" }]
[steps.discard.lifecycle]
on_start = "needs_changes"
on_complete = "closed"
on_fail = { event = "Escalated" }
