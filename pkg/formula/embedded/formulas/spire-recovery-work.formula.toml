# spire-recovery-work.formula.toml — v2 fallback formula for recovery workflows.
#
# Minimal v2 formula so that recovery beads do not hard-error when resolved
# through the v2 path. Full recovery workflow uses the v3 step graph.
# Step prompts are placeholder stubs — full implementation is in spi-j12j9.3.

name = "spire-recovery-work"
description = "Recovery workflow (v2 fallback): collect_context → plan → remediate → verify → document → finish"
version = 2

[phases.collect_context]
role = "wizard"
behavior = "recovery-collect-context"
timeout = "5m"
model = "claude-opus-4-6"

[phases.plan]
role = "wizard"
behavior = "recovery-plan"
timeout = "5m"
model = "claude-opus-4-6"

[phases.remediate]
timeout = "30m"
model = "claude-sonnet-4-6"
role = "apprentice"
apprentice = true
worktree = true

[phases.verify]
role = "wizard"
behavior = "recovery-verify"
timeout = "10m"
model = "claude-opus-4-6"

[phases.document]
role = "wizard"
behavior = "recovery-document"
timeout = "5m"
model = "claude-opus-4-6"

[phases.finish]
strategy = "close"
auto = true

[vars.task]
description = "The recovery bead ID being worked on"
required = true
