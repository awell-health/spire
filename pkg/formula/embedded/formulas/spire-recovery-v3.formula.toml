# spire-recovery-v3.formula.toml — v3 lifecycle graph for recovery workflows.
#
# Recovery beads are first-class self-healing workflows. This formula defines
# the step graph for bounded remediation: collect context, diagnose, choose an
# action (resummon/reset/reset-to-step), execute it, verify, document, finish.
#
# All steps use `recovery.execute` — the bounded action dispatcher — NOT
# `wizard.run`. Recovery steps operate on the SOURCE bead's state (labels,
# status) rather than spawning apprentice-style agents with worktrees.
#
# Two terminal paths: finish (verification passed) and escalate (verification failed).
# The document step fires only when verification passes.

name = "spire-recovery-v3"
description = "Recovery workflow: collect context, diagnose, remediate, verify, document learnings, and finish or escalate"
version = 3
entry = "collect_context"

[vars.bead_id]
type = "bead_id"
description = "The recovery bead being worked on"
required = true

[vars.parent_bead]
type = "bead_id"
description = "The bead that encountered the failure"
required = true

[vars.failure_class]
type = "string"
description = "Failure classification (e.g. implement-merge-conflict, build-failure)"
required = true

[vars.base_branch]
description = "Base branch for any git operations"
default = "main"

# --- Steps ---

# Step 1: Verify the source bead is still interrupted (not already fixed).
[steps.collect_context]
kind = "op"
action = "recovery.execute"
title = "Verify source bead is still interrupted"
[steps.collect_context.with]
action = "verify-clean"

# Step 2: Agent decision — Claude chooses the best recovery action from the
# ranked list produced by Diagnose, informed by per-bead and cross-bead learnings.
[steps.decide]
kind = "op"
action = "recovery.decide"
needs = ["collect_context"]
title = "Agent decision: choose recovery action"

# Step 3a: Execute remediation — action chosen by the decide step.
# Only fires when decide chose a concrete action (not needs-human, escalate, or do-nothing).
[steps.remediate]
kind = "op"
action = "recovery.execute"
needs = ["decide"]
title = "Execute remediation"
[steps.remediate.with]
action = "{{ steps.decide.outputs.chosen_action }}"
[steps.remediate.when]
all = [
    { left = "steps.decide.outputs.needs_human", op = "eq", right = "false" },
    { left = "steps.decide.outputs.chosen_action", op = "ne", right = "do-nothing" },
    { left = "steps.decide.outputs.chosen_action", op = "ne", right = "escalate" },
]

# Step 3b: Halt — decide flagged low confidence or needs_human.
[steps.needs_human_halt]
kind = "op"
action = "recovery.execute"
needs = ["decide"]
title = "Halt — needs human review"
[steps.needs_human_halt.with]
action = "escalate"
reason = "recovery agent flagged needs_human (low confidence)"
[steps.needs_human_halt.when]
all = [{ left = "steps.decide.outputs.needs_human", op = "eq", right = "true" }]

# Step 3c: Direct escalate — decide chose escalation.
[steps.escalate_chosen]
kind = "op"
action = "recovery.execute"
needs = ["decide"]
title = "Escalate — agent chose escalation"
[steps.escalate_chosen.with]
action = "escalate"
reason = "recovery agent chose escalation"
[steps.escalate_chosen.when]
all = [{ left = "steps.decide.outputs.chosen_action", op = "eq", right = "escalate" }]

# Step 3: Verify the source bead is clean after remediation.
[steps.verify]
kind = "op"
action = "recovery.execute"
needs = ["remediate"]
title = "Verify recovery — check source bead health"
produces = ["verification_status"]
[steps.verify.with]
action = "verify-clean"

# Step 4: Record learnings via Claude (only on clean verification).
# Calls Claude to generate a learning summary, writes to bead metadata and
# recovery_learnings table. Best-effort: if Claude fails, the step returns a
# warning output and the graph proceeds to finish.
[steps.learn]
kind = "op"
action = "recovery.learn"
needs = ["verify"]
title = "Record recovery learnings"
[steps.learn.when]
all = [{ left = "steps.verify.outputs.verification_status", op = "eq", right = "clean" }]

# Step 5a: Close resolved recovery bead (after learning).
[steps.finish]
kind = "op"
action = "bead.finish"
needs = ["learn"]
terminal = true
title = "Close resolved recovery bead"
[steps.finish.with]
status = "resolved"

# Step 5b: Escalate if source bead was already clean (nothing to do).
[steps.already_clean]
kind = "op"
action = "bead.finish"
needs = ["collect_context"]
terminal = true
title = "Source bead already clean — close recovery bead"
[steps.already_clean.with]
status = "resolved"
[steps.already_clean.when]
all = [{ left = "steps.collect_context.outputs.verification_status", op = "eq", right = "clean" }]

# Step 5c: Escalate unresolved recovery (verification did not pass after remediation).
[steps.escalate]
kind = "op"
action = "recovery.execute"
needs = ["verify"]
terminal = true
title = "Escalate unresolved recovery"
[steps.escalate.with]
action = "escalate"
reason = "recovery remediation did not resolve the interrupted state"
[steps.escalate.when]
all = [{ left = "steps.verify.outputs.verification_status", op = "ne", right = "clean" }]
