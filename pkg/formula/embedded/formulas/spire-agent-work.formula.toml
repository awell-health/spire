name = "spire-agent-work"
description = "Standard agent work protocol: plan → implement → review → merge. Wizard validates approach before apprentice implements."
version = 2

[phases.plan]
role = "wizard"
behavior = "task-plan"
timeout = "5m"
model = "claude-opus-4-6"
# Wizard validates approach, identifies key files, and posts an implementation
# plan as a comment on the bead. Apprentice uses this plan during implement.

[phases.implement]
timeout = "30m"
model = "claude-sonnet-4-6"
model_policy = "adaptive"
base_model = "claude-sonnet-4-6"
escalation_model = "claude-opus-4-6"
role = "apprentice"
apprentice = true
worktree = true
context = ["CLAUDE.md", "PLAYBOOK.md"]

[phases.review]
timeout = "10m"
model = "claude-opus-4-6"
role = "sage"
verdict_only = true

[phases.review.revision_policy]
max_rounds = 3
arbiter_model = "claude-opus-4-6"

[phases.merge]
strategy = "squash"
auto = true
doc_patterns = ["README.md", "PLAYBOOK.md", "ARCHITECTURE.md", "VISION.md", "PLAN.md", "LOCAL.md", "CLAUDE.md", "docs/*.md"]

[vars.task]
description = "The bead ID being worked on"
required = true
