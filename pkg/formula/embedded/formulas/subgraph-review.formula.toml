# subgraph-review.formula.toml — Review DAG as a step-graph sub-graph.
#
# Encodes the review DAG from docs/review-dag.md:
#
#   sage-review
#     -> fix      (verdict == request_changes && completed_count < max_review_rounds)
#     -> arbiter  (verdict == request_changes && completed_count >= max_review_rounds)
#   sage-review | arbiter -> merge
#     -> merge    (verdict == approve || arbiter_decision == merge || arbiter_decision == split)
#   arbiter -> discard
#     -> discard  (arbiter_decision == discard)
#
# Loop mechanics:
#   fix declares resets = ["sage-review", "fix"]. After fix completes, the
#   interpreter resets both steps to pending — enabling a new sage-review round.
#   sage-review.completed_count tracks how many rounds have completed.
#   The formula routes on this mechanical fact, not hidden counter mutation.
#
# Terminal invariant (docs/review-dag.md):
#   Every path ends with the branch either merged to main or deleted.
#   No hanging branches. No orphaned code.
#
# Action fields: each step declares an action for the v3 graph.run interpreter.
# The role fields are preserved for backward compat with the v2 review DAG walker.

name = "subgraph-review"
description = "Review DAG: sage-review -> fix/arbiter -> merge/discard with terminal branch invariants"
version = 3

[vars.bead_id]
description = "The bead being reviewed"
required = true

[vars.branch]
description = "Staging branch (feat/<bead-id> or epic/<bead-id>)"
required = true

[vars.max_review_rounds]
description = "Maximum review rounds before arbiter escalation"
default = "3"

# Step 1: Sage reviews the staging branch. No condition — always the entry point.
[steps.sage-review]
kind = "op"
action = "wizard.run"
flow = "sage-review"
description = "Sage reviews staging branch diff"
role = "sage"
title = "Sage review"
timeout = "10m"
model = "claude-opus-4-7"
verdict_only = true

# Step 2: Fix apprentice. Routes when sage rejects AND round budget remains.
# After fix completes, resets sage-review and fix to pending for re-review.
#
# Handoff: bundle (Principle 1, spi-1dk71j / spi-tlj32a). The fix apprentice
# produces git commits and therefore MUST deliver them as a bundle artifact
# — the executor consumes the bundle into the parent's staging worktree
# before re-entering sage-review. The dispatch path is
# pkg/executor/commit_producing_apprentice.go (actionReviewFix), shared with
# the worker-mode cleric repair so both signal/apply contracts stay
# byte-compatible.
[steps.fix]
kind = "op"
action = "wizard.run"
flow = "review-fix"
description = "Fix apprentice addresses review feedback within round budget"
needs = ["sage-review"]
role = "apprentice"
title = "Fix: address sage review feedback"
timeout = "15m"
model = "claude-opus-4-7"
resets = ["sage-review", "fix"]
[steps.fix.when]
all = [
  { left = "steps.sage-review.outputs.verdict", op = "eq", right = "request_changes" },
  { left = "steps.sage-review.completed_count", op = "lt", right = "vars.max_review_rounds" },
]

# Step 3: Arbiter. Routes when sage rejects AND round budget is exhausted.
[steps.arbiter]
kind = "op"
action = "wizard.run"
flow = "arbiter"
description = "Arbiter makes final decision once round budget is exhausted"
needs = ["sage-review"]
role = "arbiter"
title = "Arbiter: break review deadlock"
timeout = "10m"
model = "claude-opus-4-7"
[steps.arbiter.when]
all = [
  { left = "steps.sage-review.outputs.verdict", op = "eq", right = "request_changes" },
  { left = "steps.sage-review.completed_count", op = "ge", right = "vars.max_review_rounds" },
]

# Step 4a: Merge signal. Terminal — signals that review approved the work.
# Uses noop because subgraph-review is a nested sub-graph: the parent formula
# (task-default, epic-default) is responsible for the real merge via
# its own git.merge_to_main step, keyed on steps.review.outputs.outcome == "merge".
# The v2 review walker ignores the action field and dispatches via executeTerminalStep.
[steps.merge]
kind = "op"
action = "noop"
description = "Signal merge outcome — parent graph performs the actual merge"
needs = ["sage-review", "arbiter"]
terminal = true
title = "Merge to main"
[steps.merge.when]
any = [
  { left = "steps.sage-review.outputs.verdict", op = "eq", right = "approve" },
  { left = "steps.arbiter.outputs.arbiter_decision", op = "eq", right = "merge" },
  { left = "steps.arbiter.outputs.arbiter_decision", op = "eq", right = "split" },
]

# Step 4b: Discard signal. Terminal — signals that arbiter discarded the work.
# Uses noop for the same reason as merge: parent graph handles the real bead.finish.
[steps.discard]
kind = "op"
action = "noop"
description = "Signal discard outcome — parent graph performs the actual discard"
needs = ["arbiter"]
terminal = true
title = "Discard branch"
[steps.discard.when]
all = [{ left = "steps.arbiter.outputs.arbiter_decision", op = "eq", right = "discard" }]

# --- Typed outputs ---
# Outer graphs route mechanically on these. See docs/v3-formula.md.

[outputs.outcome]
type = "enum"
values = ["merge", "discard"]
description = "Terminal review outcome — which terminal step fired"

[outputs.verdict]
type = "string"
description = "Last sage verdict (approve or request_changes)"

[outputs.arbiter_decision]
type = "string"
description = "Arbiter decision if escalated (merge, split, or discard)"

[outputs.rounds_used]
type = "int"
description = "Number of review rounds completed"
