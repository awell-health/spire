# cleric-default.formula.toml — default agentic recovery lifecycle.
#
# collect_context → decide → execute → verify → learn → finish
# Needs-human path: collect_context → decide → finish_needs_human

name = "cleric-default"
description = "Agentic recovery: Claude-driven decide + learn steps, always-close lifecycle"
version = 3
entry = "collect_context"

[vars.bead_id]
type = "bead_id"
description = "The recovery bead being worked on"
required = true

[vars.parent_bead]
type = "bead_id"
description = "The bead that encountered the failure"
required = true

[vars.failure_class]
type = "string"
description = "Failure classification (e.g. empty-implement, build-failure)"
required = true

[vars.base_branch]
description = "Base branch for any git operations"
default = "main"

# --- Steps ---

# Step 1: Collect diagnosis context + prior learnings (mechanical, no Claude).
[steps.collect_context]
kind = "op"
action = "cleric.execute"
title = "Collect diagnosis context and prior learnings"
[steps.collect_context.with]
action = "collect_context"

# Step 2: Claude-driven decision — choose recovery action.
[steps.decide]
kind = "op"
action = "cleric.execute"
needs = ["collect_context"]
title = "Claude-driven recovery decision"
[steps.decide.with]
action = "decide"

# Step 3: Execute the chosen recovery action (mechanical dispatch).
# Skipped if decide set needs_human=true.
[steps.execute]
kind = "op"
action = "cleric.execute"
needs = ["decide"]
title = "Execute chosen recovery action"
[steps.execute.with]
action = "execute"
[steps.execute.when]
all = [{ left = "steps.decide.outputs.needs_human", op = "ne", right = "true" }]

# Step 4: Verify source bead health after remediation.
[steps.verify]
kind = "op"
action = "cleric.execute"
needs = ["execute"]
title = "Verify source bead health"
produces = ["verification_status"]
[steps.verify.with]
action = "verify"

# Step 5: Claude-driven learning extraction.
[steps.learn]
kind = "op"
action = "cleric.learn"
needs = ["verify"]
title = "Claude-driven learning extraction"
[steps.learn.with]
action = "learn"

# Step 6a: Close recovery bead (happy path — after learning).
[steps.finish]
kind = "op"
action = "cleric.execute"
needs = ["learn"]
terminal = true
title = "Close recovery bead"
[steps.finish.with]
action = "finish"

# Step 6b: Close recovery bead (needs-human path — after decide).
[steps.finish_needs_human]
kind = "op"
action = "cleric.execute"
needs = ["decide"]
terminal = true
title = "Close recovery bead (needs human)"
[steps.finish_needs_human.with]
action = "finish"
[steps.finish_needs_human.when]
all = [{ left = "steps.decide.outputs.needs_human", op = "eq", right = "true" }]
