# cleric-default.formula.toml — recovery lifecycle for a recovery bead.
#
# Cleric runtime (spi-hhkozk). The cleric is a one-shot Claude agent:
#   decide → publish → wait_for_gate → {execute → finish | takeover | requeue}
#
# - decide: spawn Claude with the cleric prompt; it emits a ProposedAction
#   JSON to stdout.
# - publish: parse the JSON, write it to the recovery bead's metadata,
#   transition the bead to awaiting_review.
# - wait_for_gate: park until the gateway sets steps.wait_for_gate.outputs.gate
#   to "approve" / "reject" / "takeover".
# - approve → execute the action via the gateway, then finish (records
#   outcome for promotion/demotion tally).
# - reject → noop step resets decide+publish+wait_for_gate so a fresh
#   cleric round runs against the rejection comment.
# - takeover → label source bead `needs-manual`, close recovery; humans
#   take over the source bead manually.
#
# Single-owner invariant: the steward only dispatches this formula on
# recovery beads in `in_progress`. Wizard summon refuses to fire while
# any non-closed recovery bead has `caused-by` → the source bead.

name = "cleric-default"
description = "One-shot cleric round: propose → human gate → execute / takeover / requeue"
version = 3
entry = "decide"

[vars.bead_id]
type = "bead_id"
description = "The recovery bead being worked on"
required = true

# --- Steps ---

# Step 1: Spawn Claude with the cleric prompt — emits a ProposedAction JSON.
[steps.decide]
kind = "op"
action = "wizard.run"
flow = "cleric-decide"
title = "Cleric proposes a recovery action"
[steps.decide.with]
prompt = "cleric"
[steps.decide.lifecycle]
on_start = "in_progress"
on_complete = "in_progress"
on_fail = { event = "Escalated" }

# Step 2: Parse ProposedAction JSON, write to bead, transition to awaiting_review.
[steps.publish]
kind = "op"
action = "cleric.publish"
needs = ["decide"]
title = "Publish proposal to recovery bead"
[steps.publish.lifecycle]
on_start = "in_progress"
on_complete = "awaiting_review"
on_fail = { event = "Escalated" }

# Step 3: Park until gateway sets gate output.
#
# Only `gate` is required to unpark this step — approve/takeover paths
# never produce a rejection_comment, and the produced-output enforcement
# in pkg/executor/graph_actions.go would otherwise block them. Reject
# paths still write rejection_comment to outputs; downstream readers
# (cleric.reject, the new cleric prompt-builder) treat its presence as
# optional context.
[steps.wait_for_gate]
kind = "wait"
needs = ["publish"]
produces = ["gate"]
title = "Wait for human gate"
[steps.wait_for_gate.lifecycle]
on_start = "awaiting_review"
on_complete_match = [
  { when = "outputs.gate == 'approve'",  status = "in_progress" },
  { when = "outputs.gate == 'reject'",   status = "in_progress" },
  { when = "outputs.gate == 'takeover'", status = "awaiting_human" },
]
on_fail = { event = "Escalated" }

# Step 4a: Execute the approved action (approve path).
[steps.execute]
kind = "op"
action = "cleric.execute"
needs = ["wait_for_gate"]
title = "Execute approved recovery action"
[steps.execute.when]
all = [{ left = "steps.wait_for_gate.outputs.gate", op = "eq", right = "approve" }]
[steps.execute.lifecycle]
on_start = "in_progress"
on_complete = "in_progress"
on_fail = { event = "Escalated" }

# Step 4b: Reject path — record outcome for promotion/demotion tally
# (spi-kl8x5y) and reset the prior three steps so a fresh cleric round
# runs. cleric.reject replaces the prior noop action so reject outcomes
# are visible to the learning store.
[steps.requeue_after_reject]
kind = "op"
action = "cleric.reject"
needs = ["wait_for_gate"]
resets = ["decide", "publish", "wait_for_gate"]
title = "Record reject outcome and requeue cleric"
[steps.requeue_after_reject.when]
all = [{ left = "steps.wait_for_gate.outputs.gate", op = "eq", right = "reject" }]
[steps.requeue_after_reject.lifecycle]
on_start = "in_progress"
on_complete = "in_progress"
on_fail = { event = "Escalated" }

# Step 4c: Takeover path — label source bead needs-manual, close recovery.
[steps.handle_takeover]
kind = "op"
action = "cleric.takeover"
needs = ["wait_for_gate"]
terminal = true
title = "Human takeover — close recovery, mark source needs-manual"
[steps.handle_takeover.when]
all = [{ left = "steps.wait_for_gate.outputs.gate", op = "eq", right = "takeover" }]
[steps.handle_takeover.lifecycle]
on_start = "awaiting_human"
on_complete = "closed"
on_fail = { event = "Escalated" }

# Step 5: Record outcome for promotion/demotion tally and close recovery.
[steps.finish]
kind = "op"
action = "cleric.finish"
needs = ["execute"]
terminal = true
title = "Record outcome and close recovery"
[steps.finish.lifecycle]
on_start = "in_progress"
on_complete = "closed"
on_fail = { event = "Escalated" }
