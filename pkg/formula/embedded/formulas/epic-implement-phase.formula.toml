# epic-implement-phase.formula.toml — Declarative epic implementation lifecycle (v3).
#
# Replaces the v2 dispatch=wave + hardcoded build-fix loop with a declared
# step graph. The executor interprets this graph generically instead of
# embedding wave/sequential/direct logic in hidden branches.
#
# Data flow:
#   dispatch-children → verify-build ─┬─[pass]→ verified (noop terminal)
#                                      └─[fail]→ build-failed (noop terminal)
#
# The build-fix loop (verify → fix → re-verify) requires interpreter loop
# support which will be added in spi-whcii.6. For now, build failures
# route to the build-failed terminal which escalates to the wizard.

name = "epic-implement-phase"
description = "Declarative epic implementation: dispatch children in waves, verify build, signal readiness for review"
version = 3

[vars.bead_id]
type = "bead_id"
description = "The epic bead being implemented"
required = true

[vars.max_build_fix_rounds]
type = "int"
description = "Maximum build-fix attempts (reserved for loop support)"
default = "2"

# --- Workspaces ---

[workspaces.staging]
kind = "staging"
branch = "staging/{vars.bead_id}"
base = "main"
scope = "run"
cleanup = "terminal"

# --- Steps ---

# Step 1: Dispatch child beads in dependency waves.
# ComputeWaves topologically sorts subtasks and spawns parallel apprentices
# per wave, merging each wave's branches into the staging worktree.
[steps.dispatch-children]
kind = "dispatch"
action = "dispatch.children"
workspace = "staging"
title = "Dispatch child beads"
[steps.dispatch-children.with]
strategy = "dependency-wave"

# Step 2: Verify build in the staging worktree after all children merge.
[steps.verify-build]
kind = "op"
action = "verify.run"
needs = ["dispatch-children"]
workspace = "staging"
title = "Verify build"
produces = ["status"]
[steps.verify-build.with]
build = "go build ./..."

# Step 3a: Signal success — parent graph performs review and merge.
# Uses noop because epic-implement-phase is a nested sub-graph: the parent
# formula (spire-epic-v3) is responsible for review and the real merge via
# its own git.merge_to_main step, keyed on steps.implement.outputs.outcome == "verified".
[steps.verified]
kind = "op"
action = "noop"
needs = ["verify-build"]
terminal = true
title = "Build verified — ready for review"
description = "Signal success — parent graph performs review and merge"
[steps.verified.when]
all = [{ left = "steps.verify-build.outputs.status", op = "eq", right = "pass" }]

# Step 3b: Escalate on build failure.
# Only fires when verify-build fails (status == fail). Terminal — the graph
# ends here so verified never executes after a failed build.
# Uses noop because the parent graph handles escalation.
[steps.build-failed]
kind = "op"
action = "noop"
needs = ["verify-build"]
terminal = true
title = "Build verification failed"
[steps.build-failed.with]
status = "escalate"
[steps.build-failed.when]
all = [{ left = "steps.verify-build.outputs.status", op = "eq", right = "fail" }]

# --- Outputs ---

[outputs.dispatch_status]
type = "string"
description = "Result of child dispatch (pass/fail)"

[outputs.build_status]
type = "enum"
values = ["pass", "fail"]
description = "Result of build verification"

[outputs.outcome]
type = "enum"
values = ["verified", "build-failed"]
description = "Terminal outcome for parent routing"
