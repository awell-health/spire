name = "spire-bugfix"
description = "Quick bugfix: plan → implement → review → merge. Wizard validates approach before apprentice implements."
version = 2

[phases.plan]
role = "wizard"
timeout = "3m"
model = "claude-opus-4-6"
# Wizard validates the bugfix approach and posts a focused plan as a comment.
# Shorter timeout than agent-work since bugfixes are typically simpler.

[phases.implement]
timeout = "10m"
model = "claude-sonnet-4-6"
model_policy = "adaptive"
base_model = "claude-sonnet-4-6"
escalation_model = "claude-opus-4-6"
role = "apprentice"
apprentice = true
worktree = true
context = ["CLAUDE.md"]

[phases.review]
timeout = "10m"
model = "claude-opus-4-6"
role = "sage"
verdict_only = true

[phases.review.revision_policy]
max_rounds = 2
arbiter_model = "claude-opus-4-6"

[phases.merge]
strategy = "squash"
auto = true

[vars.task]
description = "The bead ID being worked on"
required = true
