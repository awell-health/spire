# bug-default.formula.toml — default lifecycle graph for bugfix work.
#
# Same structure as task-default but with bugfix-appropriate defaults:
# max_review_rounds=2 and shorter timeouts.

name = "bug-default"
description = "Quick bugfix: plan → implement → review → merge"
version = 3
entry = "plan"

[vars.bead_id]
type = "bead_id"
description = "The bead being worked on"
required = true

[vars.base_branch]
description = "Base branch to merge into"
default = "main"

[vars.max_review_rounds]
description = "Maximum review rounds before arbiter escalation (bugfix: 2)"
default = "2"

# --- Workspaces ---

[workspaces.feature]
kind = "owned_worktree"
branch = "feat/{vars.bead_id}"
base = "{vars.base_branch}"
scope = "run"
cleanup = "terminal"

# --- Steps ---

[steps.plan]
kind = "op"
action = "wizard.run"
flow = "task-plan"
title = "Plan bugfix"
[steps.plan.with]
extra_instructions = """
IMPORTANT: Before planning the fix, identify which commit or bead introduced this bug.
Once identified, create a caused-by dependency:
  bd dep add {vars.bead_id} <causing-bead-id> --type caused-by
If the causing bead cannot be determined, note this in the plan and proceed without the link.
"""

[steps.implement]
kind = "op"
action = "wizard.run"
flow = "implement"
needs = ["plan"]
workspace = "feature"
title = "Implement bugfix"

[steps.review]
kind = "call"
action = "graph.run"
needs = ["implement"]
workspace = "feature"
graph = "subgraph-review"
title = "Review bugfix"

[steps.merge]
kind = "op"
action = "git.merge_to_main"
needs = ["review"]
workspace = "feature"
title = "Merge to main"
[steps.merge.with]
strategy = "squash"
[steps.merge.when]
all = [{ left = "steps.review.outputs.outcome", op = "eq", right = "merge" }]

[steps.close]
kind = "op"
action = "bead.finish"
needs = ["merge"]
terminal = true
title = "Close bead"
[steps.close.with]
status = "closed"

[steps.discard]
kind = "op"
action = "bead.finish"
needs = ["review"]
terminal = true
title = "Discard branch"
[steps.discard.with]
status = "discard"
[steps.discard.when]
all = [{ left = "steps.review.outputs.outcome", op = "eq", right = "discard" }]
