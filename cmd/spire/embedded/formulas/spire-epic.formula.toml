name = "spire-epic"
description = "Epic lifecycle: design validation, plan, wave-based implement, review with judgment, merge."
version = 2

[phases.design]
behavior = "validate-design"
role = "wizard"
timeout = "1m"
max_turns = 1
# Wizard validates that the epic has at least one discovered-from dep pointing to a
# closed design bead. Uses the dep graph, not ref: labels. Timeout is just a safety net.

[phases.plan]
behavior = "generate-subtasks"
role = "wizard"
timeout = "10m"
max_turns = 5
model = "claude-opus-4-6"
# Wizard invokes Claude (Opus) with all context inline to generate subtask breakdown.
# Planning is judgment-heavy: shared file detection, wave ordering, negative constraints.

[phases.implement]
timeout = "10m"
model = "claude-opus-4-6"
role = "apprentice"
dispatch = "wave"
staging_branch = "epic/{bead-id}"
apprentice = true
worktree = true
context = ["CLAUDE.md", "PLAYBOOK.md"]
# build command comes from the repo's spire.yaml — not hardcoded here

[phases.review]
timeout = "20m"
model = "claude-opus-4-6"
role = "sage"
verdict_only = true
judgment = true

[phases.review.revision_policy]
max_rounds = 3
arbiter_model = "claude-opus-4-6"

[phases.merge]
behavior = "merge-to-main"
strategy = "squash"
staging_branch = "epic/{bead-id}"
auto = true

[vars.task]
description = "The epic bead ID"
required = true
