# review-phase.formula.toml — Review DAG as a step-graph formula (v3).
#
# Encodes the review DAG from docs/review-dag.md:
#
#   sage-review
#     → fix      (verdict == request_changes && round < max_rounds)
#     → arbiter  (verdict == request_changes && round >= max_rounds)
#   sage-review | arbiter → merge
#     → merge    (verdict == approve || arbiter_decision == merge || arbiter_decision == split)
#   arbiter → discard
#     → discard  (arbiter_decision == discard)
#
# Terminal invariant (docs/review-dag.md):
#   Every path ends with the branch either merged to main or deleted.
#   No hanging branches. No orphaned code.
#
# Step conditions use compound guards. ALL guards in a condition must hold
# before a step fires. Missing a guard causes simultaneous step activation:
#   - fix without round check: fix && arbiter both fire when round >= max_rounds.
#   - arbiter without verdict check: arbiter && merge fire simultaneously on late approval.

name = "review-phase"
description = "Review DAG: sage-review → fix/arbiter → merge/discard with terminal branch invariants"
version = 3

[vars.bead_id]
description = "The bead being reviewed"
required = true

[vars.branch]
description = "Staging branch (feat/<bead-id> or epic/<bead-id>)"
required = true

[vars.max_rounds]
description = "Maximum review rounds before arbiter escalation"
default = "3"

# Step 1: Sage reviews the staging branch. No condition — always the entry point.
[steps.sage-review]
description = "Sage reviews staging branch diff"
role = "sage"

# Step 2: Fix apprentice. Compound guard: BOTH verdict AND round must hold.
# round check prevents fix and arbiter from firing simultaneously when round >= max_rounds.
[steps.fix]
description = "Fix apprentice addresses review feedback within round budget"
needs = ["sage-review"]
condition = "verdict == request_changes && round < max_rounds"
role = "apprentice"

# Step 3: Arbiter. Compound guard: BOTH verdict AND round must hold.
# verdict check prevents arbiter and merge from firing simultaneously on a late-round approval.
[steps.arbiter]
description = "Arbiter makes final decision once round budget is exhausted"
needs = ["sage-review"]
condition = "verdict == request_changes && round >= max_rounds"
role = "arbiter"

# Step 4a: Merge. Terminal — branch merged to main and deleted.
# Fires when sage approves OR arbiter force-approves OR arbiter splits (partial merge).
[steps.merge]
description = "Merge staging to main — terminal: branch merged and deleted"
needs = ["sage-review", "arbiter"]
condition = "verdict == approve || arbiter_decision == merge || arbiter_decision == split"
terminal = true

# Step 4b: Discard. Terminal — branch deleted without merging.
# Fires only when arbiter explicitly discards. Bead closed as wontfix.
[steps.discard]
description = "Delete branch without merging — terminal: branch deleted, bead closed wontfix"
needs = ["arbiter"]
condition = "arbiter_decision == discard"
terminal = true
