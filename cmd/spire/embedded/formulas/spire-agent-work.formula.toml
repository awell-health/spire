name = "spire-agent-work"
description = "Standard agent work protocol: implement → review → merge. Design happens in design beads before the task is filed."
version = 2

[phases.implement]
timeout = "15m"
model = "claude-sonnet-4-6"
role = "apprentice"
no_handoff = true
worktree = true
context = ["CLAUDE.md", "PLAYBOOK.md"]

[phases.review]
timeout = "10m"
model = "claude-opus-4-6"
role = "sage"
verdict_only = true

[phases.review.revision_policy]
max_rounds = 3
arbiter_model = "claude-opus-4-6"

[phases.merge]
strategy = "squash"
auto = true

[vars.task]
description = "The bead ID being worked on"
required = true
