version: 2
project_name: spire

# Patch the Helm chart Chart.yaml so its version/appVersion match the release
# tag. The chart is a sentinel 0.0.0 in git; goreleaser rewrites both fields
# before packaging so downstream artifacts (and default image tags derived
# from .Chart.AppVersion) are pinned to the release version.
before:
  hooks:
    - sed -i 's/^version:.*/version: {{ .Version }}/' helm/spire/Chart.yaml
    - sed -i 's/^appVersion:.*/appVersion: "{{ .Version }}"/' helm/spire/Chart.yaml

builds:
  - main: ./cmd/spire
    binary: spire
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    overrides:
      - goos: linux
        goarch: arm64
        env:
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums_linux.txt"

dockers:
  # --- steward ---
  - id: steward-amd64
    goos: linux
    goarch: amd64
    ids: [spire]
    image_templates:
      - "ghcr.io/awell-health/spire-steward:{{ .Version }}-amd64"
      - "ghcr.io/awell-health/spire-steward:latest-amd64"
    dockerfile: Dockerfile.steward
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{ .Tag }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/awell-health/spire"

  - id: steward-arm64
    goos: linux
    goarch: arm64
    ids: [spire]
    image_templates:
      - "ghcr.io/awell-health/spire-steward:{{ .Version }}-arm64"
      - "ghcr.io/awell-health/spire-steward:latest-arm64"
    dockerfile: Dockerfile.steward
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.version={{ .Tag }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/awell-health/spire"

  # --- agent ---
  - id: agent-amd64
    goos: linux
    goarch: amd64
    ids: [spire]
    image_templates:
      - "ghcr.io/awell-health/spire-agent:{{ .Version }}-amd64"
      - "ghcr.io/awell-health/spire-agent:latest-amd64"
    dockerfile: Dockerfile.agent
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{ .Tag }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/awell-health/spire"

  - id: agent-arm64
    goos: linux
    goarch: arm64
    ids: [spire]
    image_templates:
      - "ghcr.io/awell-health/spire-agent:{{ .Version }}-arm64"
      - "ghcr.io/awell-health/spire-agent:latest-arm64"
    dockerfile: Dockerfile.agent
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.version={{ .Tag }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/awell-health/spire"

  # --- builder ---
  - id: builder-amd64
    goos: linux
    goarch: amd64
    ids: [spire]
    image_templates:
      - "ghcr.io/awell-health/spire-builder:{{ .Version }}-amd64"
      - "ghcr.io/awell-health/spire-builder:latest-amd64"
    dockerfile: Dockerfile.builder
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.version={{ .Tag }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/awell-health/spire"

  - id: builder-arm64
    goos: linux
    goarch: arm64
    ids: [spire]
    image_templates:
      - "ghcr.io/awell-health/spire-builder:{{ .Version }}-arm64"
      - "ghcr.io/awell-health/spire-builder:latest-arm64"
    dockerfile: Dockerfile.builder
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.version={{ .Tag }}"
      - "--label=org.opencontainers.image.created={{ .Date }}"
      - "--label=org.opencontainers.image.source=https://github.com/awell-health/spire"

docker_manifests:
  # steward
  - name_template: "ghcr.io/awell-health/spire-steward:{{ .Version }}"
    image_templates:
      - "ghcr.io/awell-health/spire-steward:{{ .Version }}-amd64"
      - "ghcr.io/awell-health/spire-steward:{{ .Version }}-arm64"
  - name_template: "ghcr.io/awell-health/spire-steward:latest"
    image_templates:
      - "ghcr.io/awell-health/spire-steward:latest-amd64"
      - "ghcr.io/awell-health/spire-steward:latest-arm64"

  # agent
  - name_template: "ghcr.io/awell-health/spire-agent:{{ .Version }}"
    image_templates:
      - "ghcr.io/awell-health/spire-agent:{{ .Version }}-amd64"
      - "ghcr.io/awell-health/spire-agent:{{ .Version }}-arm64"
  - name_template: "ghcr.io/awell-health/spire-agent:latest"
    image_templates:
      - "ghcr.io/awell-health/spire-agent:latest-amd64"
      - "ghcr.io/awell-health/spire-agent:latest-arm64"

  # builder
  - name_template: "ghcr.io/awell-health/spire-builder:{{ .Version }}"
    image_templates:
      - "ghcr.io/awell-health/spire-builder:{{ .Version }}-amd64"
      - "ghcr.io/awell-health/spire-builder:{{ .Version }}-arm64"
  - name_template: "ghcr.io/awell-health/spire-builder:latest"
    image_templates:
      - "ghcr.io/awell-health/spire-builder:latest-amd64"
      - "ghcr.io/awell-health/spire-builder:latest-arm64"

# No release — the darwin job creates the release and we append to it.
release:
  disable: true
