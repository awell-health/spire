apiVersion: v1
kind: Service
metadata:
  name: spire-steward-metrics
  labels:
    app: spire-steward
    component: metrics
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: spire-steward
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
  type: ClusterIP
