apiVersion: v1
kind: Secret
metadata:
  name: spire-credentials
  namespace: spire
type: Opaque
stringData:
  anthropic-key: ""      # Anthropic API key for Claude
  github-token: ""       # GitHub token for repo access
  dolthub-user: ""       # DoltHub username for sync
  dolthub-password: ""   # DoltHub password/token for sync
  clickhouse-password: "" # ClickHouse password (if auth enabled)
