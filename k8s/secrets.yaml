apiVersion: v1
kind: Secret
metadata:
  name: spire-credentials
  namespace: spire
type: Opaque
stringData:
  # DoltHub credentials (required)
  DOLT_REMOTE_USER: "REPLACE_ME"
  DOLT_REMOTE_PASSWORD: "REPLACE_ME"

  # Anthropic tokens (for managed agents)
  ANTHROPIC_API_KEY_DEFAULT: "REPLACE_ME"
  # ANTHROPIC_API_KEY_HEAVY: "sk-ant-..."
  # ANTHROPIC_API_KEY_CI: "sk-ant-..."

  # Linear (optional, for daemon sync)
  # LINEAR_API_KEY: "lin_api_..."
