# A managed agent — operator creates a pod when work is assigned.
# The pod runs Claude headlessly via the Agent SDK.
#
# `spec.cache` is the canonical cluster-native substrate: the operator
# provisions a read-only guild-owned cache PVC and every wizard pod
# mounts it via the cache-bootstrap init container. The old
# repo-bootstrap origin-clone path is retired (spi-gvrfv).
apiVersion: spire.awell.io/v1alpha1
kind: WizardGuild
metadata:
  name: ci-worker
  namespace: spire
spec:
  displayName: "CI Worker"
  mode: managed
  prefixes: ["spi-", "open-"]
  token: default
  maxConcurrent: 1
  image: ghcr.io/awell-health/spire-agent:latest
  repo: https://github.com/awell-health/spire.git
  repoBranch: main
  cache:
    size: 10Gi
    accessMode: ReadOnlyMany
    refreshInterval: 5m
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"
