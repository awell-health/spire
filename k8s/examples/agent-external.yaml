# An external agent — represents a human's local Claude Code session.
# Created by running: spire register jb --k8s
# Or applied manually.
apiVersion: spire.awell.io/v1alpha1
kind: WizardGuild
metadata:
  name: jb
  namespace: spire
spec:
  displayName: "JB"
  mode: external
  prefixes: ["spi-", "open-", "awell-", "xserver-"]
  token: default
  maxConcurrent: 2
