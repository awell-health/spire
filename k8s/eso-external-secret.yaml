# SecretStore — configure for your provider (AWS SM example)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: spire-secret-store
  namespace: spire
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
---
# ExternalSecret — pulls secrets into k8s Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: spire-credentials-external
  namespace: spire
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: spire-secret-store
    kind: SecretStore
  target:
    name: spire-credentials
    creationPolicy: Owner
  data:
  - secretKey: anthropic-key
    remoteRef:
      key: spire/anthropic-key
  - secretKey: github-token
    remoteRef:
      key: spire/github-token
  - secretKey: dolthub-user
    remoteRef:
      key: spire/dolthub-user
  - secretKey: dolthub-password
    remoteRef:
      key: spire/dolthub-password
