apiVersion: apps/v1
kind: Deployment
metadata:
  name: spire-steward
  namespace: spire
  labels:
    app.kubernetes.io/name: spire-steward
    app.kubernetes.io/part-of: spire-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spire-steward
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spire-steward
    spec:
      serviceAccountName: spire-operator
      containers:
        - name: steward
          image: spire-steward:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: BEADS_PREFIX
              value: "spi"
            - name: DOLT_HOST
              value: "spire-dolt.spire.svc"
            - name: DOLT_PORT
              value: "3306"
            - name: STEWARD_INTERVAL
              value: "2m"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: spire-config
              mountPath: /etc/spire
              readOnly: true
          workingDir: /etc/spire
      volumes:
        - name: data
          emptyDir: {}  # steward only needs local scratch — dolt is external
        - name: spire-config
          configMap:
            name: spire-config
---
# RBAC for the operator (Phase 2: manages pods, reads secrets)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-operator
  namespace: spire
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spire-operator
rules:
  # CRDs
  - apiGroups: ["spire.awell.io"]
    resources: ["spireagents", "spireworkloads", "spireconfigs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["spire.awell.io"]
    resources: ["spireagents/status", "spireworkloads/status", "spireconfigs/status"]
    verbs: ["get", "update", "patch"]
  # Pod management (for managed agents)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Secret reading (for token injection)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spire-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: spire-operator
subjects:
  - kind: ServiceAccount
    name: spire-operator
    namespace: spire
