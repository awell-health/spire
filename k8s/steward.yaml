apiVersion: apps/v1
kind: Deployment
metadata:
  name: spire-steward
  namespace: spire
  labels:
    app.kubernetes.io/name: spire-steward
    app.kubernetes.io/part-of: spire-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spire-steward
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spire-steward
    spec:
      serviceAccountName: spire-operator
      initContainers:
        # Seed .beads/ from ConfigMap if it doesn't exist yet (first boot on PVC).
        - name: seed-beads
          image: spire-steward:dev
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              if [ ! -f /data/.beads/metadata.json ]; then
                mkdir -p /data/.beads
                cp /seed/metadata.json /data/.beads/metadata.json
                cp /seed/routes.jsonl /data/.beads/routes.jsonl
                echo "[seed] .beads/ seeded from ConfigMap"
              else
                echo "[seed] .beads/ already exists, skipping"
              fi
              # Ensure git repo exists (bd expects it).
              if [ ! -d /data/.git ]; then
                cd /data && git init -q 2>/dev/null || true
                git config user.name "spire-steward"
                git config user.email "steward@spire.local"
              fi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: beads-seed
              mountPath: /seed
              readOnly: true
      containers:
        - name: steward
          image: spire-steward:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: BEADS_PREFIX
              value: "spi"
            - name: DOLT_HOST
              value: "spire-dolt.spire.svc"
            - name: DOLT_PORT
              value: "3306"
            - name: BEADS_DOLT_SERVER_HOST
              value: "spire-dolt.spire.svc"
            - name: BEADS_DOLT_SERVER_PORT
              value: "3306"
            - name: STEWARD_INTERVAL
              value: "2m"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: spire-config
              mountPath: /etc/spire
              readOnly: true
          workingDir: /etc/spire
        - name: sidecar
          image: spire-steward:dev
          imagePullPolicy: IfNotPresent
          command: ["spire-steward-sidecar"]
          args:
            - "--comms-dir=/comms"
            - "--poll-interval=30s"
            - "--model=claude-sonnet-4-6"
            - "--context-threshold=0.45"
            - "--port=8081"
          env:
            - name: DOLT_HOST
              value: "spire-dolt.spire.svc"
            - name: DOLT_PORT
              value: "3306"
            - name: BEADS_DOLT_SERVER_HOST
              value: "spire-dolt.spire.svc"
            - name: BEADS_DOLT_SERVER_PORT
              value: "3306"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: spire-credentials
                  key: ANTHROPIC_API_KEY_DEFAULT
                  optional: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 512Mi
          workingDir: /data
          volumeMounts:
            - name: comms
              mountPath: /comms
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: spire-steward-data
        - name: comms
          emptyDir: {}
        - name: beads-seed
          configMap:
            name: beads-seed
        - name: spire-config
          configMap:
            name: spire-config
---
# RBAC for the operator (Phase 2: manages pods, reads secrets)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-operator
  namespace: spire
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spire-operator
rules:
  # CRDs
  - apiGroups: ["spire.awell.io"]
    resources: ["spireagents", "spireworkloads", "spireconfigs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["spire.awell.io"]
    resources: ["spireagents/status", "spireworkloads/status", "spireconfigs/status"]
    verbs: ["get", "update", "patch"]
  # Pod management (for managed agents)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Secret reading (for token injection)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spire-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: spire-operator
subjects:
  - kind: ServiceAccount
    name: spire-operator
    namespace: spire
