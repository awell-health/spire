apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: spire-dolt
  namespace: spire
  labels:
    app: spire-dolt
    app.kubernetes.io/name: spire-dolt
    app.kubernetes.io/component: database
spec:
  serviceName: spire-dolt
  replicas: 1
  selector:
    matchLabels:
      app: spire-dolt
  template:
    metadata:
      labels:
        app: spire-dolt
        app.kubernetes.io/name: spire-dolt
    spec:
      containers:
        - name: dolt
          image: dolthub/dolt-sql-server:latest
          ports:
            - containerPort: 3307
              name: mysql
          env:
            - name: DOLT_ROOT_PATH
              value: /var/lib/dolt
            - name: DOLT_ROOT_HOST
              value: "%"
            - name: DOLT_CREDS_PUB_KEY
              valueFrom:
                secretKeyRef:
                  name: dolt-creds
                  key: pub_key
                  optional: true
            - name: DOLT_CREDS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: dolt-creds
                  key: key_id
                  optional: true
          volumeMounts:
            - name: dolt-data
              mountPath: /var/lib/dolt
            - name: dolt-config
              mountPath: /var/lib/dolt/config.yaml
              subPath: config.yaml
            - name: dolt-creds
              mountPath: /root/.dolt/creds
              readOnly: true
            - name: init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: 3307
            initialDelaySeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3307
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: dolt-config
          configMap:
            name: dolt-server-config
        - name: dolt-creds
          secret:
            secretName: dolt-creds
            optional: true
        - name: init
          configMap:
            name: dolt-init
  volumeClaimTemplates:
  - metadata:
      name: dolt-data
    spec:
      accessModes: [ReadWriteOnce]
      resources:
        requests:
          storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: spire-dolt
  namespace: spire
  labels:
    app.kubernetes.io/name: spire-dolt
spec:
  selector:
    app: spire-dolt
  ports:
    - port: 3307
      targetPort: 3307
      name: mysql
  clusterIP: None  # headless — pods connect to spire-dolt.spire.svc:3307
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dolt-server-config
  namespace: spire
data:
  config.yaml: |
    log_level: info
    behavior:
      read_only: false
      autocommit: true
    user:
      name: root
      password: ""
    privilege_file: ""
    listener:
      host: "0.0.0.0"
      port: 3307
      max_connections: 200
      read_timeout_millis: 28800000
      write_timeout_millis: 28800000
    performance:
      query_parallelism: 4
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dolt-init
  namespace: spire
data:
  init.sh: |
    #!/bin/bash
    # First boot: clone spi database from DoltHub.
    # Subsequent boots (PV has data): no-op.
    # Database goes at DOLT_ROOT_PATH/spi/ (dolthub image auto-discovers it).
    set -e

    DB_DIR="/var/lib/dolt/spi"
    if [ ! -d "$DB_DIR/.dolt" ]; then
        echo "[dolt-init] first boot — cloning from DoltHub..."

        # Configure creds
        CRED_FILE=$(ls /root/.dolt/creds/*.jwk 2>/dev/null | head -1)
        if [ -n "$CRED_FILE" ]; then
            # Copy from symlinked secret mount to real file (dolt can't follow k8s symlinks)
            mkdir -p /tmp/dolt-creds
            cp "$CRED_FILE" /tmp/dolt-creds/
            KEY_ID=$(basename "$CRED_FILE" .jwk)
            # Write global config directly (dolt config --global doesn't persist in this image)
            echo "{\"user.creds\":\"$KEY_ID\",\"user.name\":\"spire-dolt\",\"user.email\":\"dolt@spire.local\"}" > /root/.dolt/config_global.json
            rm -rf /root/.dolt/creds
            mv /tmp/dolt-creds /root/.dolt/creds
            echo "[dolt-init] credential configured: $KEY_ID"
        else
            dolt config --global --set user.name "spire-dolt"
            dolt config --global --set user.email "dolt@spire.local"
        fi

        cd /var/lib/dolt
        dolt clone https://doltremoteapi.dolthub.com/awell/awell spi 2>&1 \
            || echo "[dolt-init] WARNING: clone failed — starting with empty database"

        echo "[dolt-init] done"
    else
        echo "[dolt-init] PV has data — skipping clone"
    fi
