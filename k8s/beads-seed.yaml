# Static .beads/ config for connecting to the shared dolt server.
# All pods mount this via initContainer instead of running bd init.
# project_id is NOT included here — ensureProjectID() queries the dolt
# server at startup and writes the correct value into metadata.json.
apiVersion: v1
kind: ConfigMap
metadata:
  name: beads-seed
  namespace: spire
  labels:
    app.kubernetes.io/name: spire
    app.kubernetes.io/component: beads-config
data:
  metadata.json: |
    {
      "database": "dolt",
      "backend": "dolt",
      "dolt_mode": "server",
      "dolt_database": "spi"
    }
  routes.jsonl: |
    {"prefix":"spi-","path":"."}
