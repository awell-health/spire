# RBAC for dolt-sync CronJob — needs pods/exec to run dolt commands inside the dolt pod
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-dolt-sync
  namespace: spire
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spire-dolt-sync
  namespace: spire
rules:
  # Need to find the dolt pod
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Need to kubectl exec into it
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spire-dolt-sync
  namespace: spire
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spire-dolt-sync
subjects:
  - kind: ServiceAccount
    name: spire-dolt-sync
    namespace: spire
