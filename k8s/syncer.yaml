# spire-syncer: optional DoltHub remote sync pod.
#
# Runs `spire sync` on a configurable interval to keep the shared dolt
# database in sync with a DoltHub remote.  If this pod is not deployed,
# everything works locally — DoltHub becomes an optional backup/collaboration
# layer rather than a dependency woven into every component.
#
# Prerequisites:
#   - The dolt-creds secret must exist with DOLT_REMOTE_USER / DOLT_REMOTE_PASSWORD.
#   - The spire-dolt service must be running (DOLT_HOST / DOLT_PORT).
#   - The beads-seed ConfigMap must exist (.beads/ metadata for bd).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spire-syncer
  namespace: spire
  labels:
    app.kubernetes.io/name: spire-syncer
    app.kubernetes.io/component: sync
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: spire-syncer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spire-syncer
    spec:
      initContainers:
        # Seed .beads/ from ConfigMap so bd/spire can find the database.
        - name: seed-beads
          image: alpine:3.20
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p /data/.beads
              cp /seed/metadata.json /data/.beads/metadata.json
              cp /seed/routes.jsonl  /data/.beads/routes.jsonl
              [ -f /seed/config.yaml ] && cp /seed/config.yaml /data/.beads/config.yaml
              if [ ! -d /data/.git ]; then
                cd /data && git init -q 2>/dev/null || true
                git config user.name "spire-syncer"
                git config user.email "syncer@spire.local"
              fi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: beads-seed
              mountPath: /seed
              readOnly: true
      containers:
        - name: syncer
          image: spire-steward:dev        # same image — contains spire binary
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              echo "[syncer] starting (interval=${SYNC_INTERVAL:-5m})"

              # Wait for dolt to be reachable.
              tries=0
              while ! bd dolt test >/dev/null 2>&1 && [ $tries -lt 30 ]; do
                sleep 2
                tries=$((tries + 1))
              done
              if bd dolt test >/dev/null 2>&1; then
                echo "[syncer] dolt connected"
              else
                echo "[syncer] WARNING: dolt not reachable after 60s, continuing anyway"
              fi

              # Main loop: pull from DoltHub, push local changes.
              while true; do
                echo "[syncer] running sync..."
                spire sync 2>&1 || echo "[syncer] sync failed (will retry)"
                echo "[syncer] sleeping ${SYNC_INTERVAL:-5m}..."
                sleep "${SYNC_INTERVAL:-5m}"
              done
          env:
            - name: DOLT_HOST
              value: "spire-dolt.spire.svc"
            - name: DOLT_PORT
              value: "3306"
            - name: SYNC_INTERVAL
              value: "5m"
            - name: DOLT_REMOTE_USER
              valueFrom:
                secretKeyRef:
                  name: spire-credentials
                  key: DOLT_REMOTE_USER
                  optional: true
            - name: DOLT_REMOTE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spire-credentials
                  key: DOLT_REMOTE_PASSWORD
                  optional: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /data
          workingDir: /data
      volumes:
        - name: data
          emptyDir: {}          # ephemeral — syncer state is transient
        - name: beads-seed
          configMap:
            name: beads-seed
