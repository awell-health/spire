apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: wizardguilds.spire.awell.io
spec:
  group: spire.awell.io
  names:
    kind: WizardGuild
    listKind: WizardGuildList
    plural: wizardguilds
    singular: wizardguild
    shortNames:
      - wg
      - guild
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [mode]
              properties:
                displayName:
                  type: string
                  description: Human-readable name for the guild
                mode:
                  type: string
                  enum: [external, managed]
                  description: |
                    external: agent runs on a dev machine, operator only sends messages.
                    managed: operator creates and manages a pod for this guild.
                capabilities:
                  type: array
                  items:
                    type: string
                  description: Skills/technologies this guild can work with
                prefixes:
                  type: array
                  items:
                    type: string
                  description: Bead prefixes this guild can claim work from
                token:
                  type: string
                  default: default
                  description: Name of the Anthropic token to use (references SpireConfig)
                maxConcurrent:
                  type: integer
                  default: 1
                  description: Max beads this guild can work on simultaneously
                maxApprentices:
                  type: integer
                  minimum: 1
                  description: |
                    Max concurrent apprentice subprocesses spawned by a single
                    wizard pod during wave dispatch. When unset, the operator
                    leaves SPIRE_MAX_APPRENTICES unset on the pod and the
                    wizard falls back to spire.yaml agent.max-apprentices,
                    then the built-in default (3).
                # Managed mode fields
                image:
                  type: string
                  description: Container image for managed agents
                repo:
                  type: string
                  description: Git repo URL for managed agents to clone
                repoBranch:
                  type: string
                  default: main
                  description: Branch to clone
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    limits:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Idle, Working, Stale, Offline, Provisioning]
                registered:
                  type: boolean
                lastSeen:
                  type: string
                  format: date-time
                currentWork:
                  type: array
                  items:
                    type: string
                  description: Bead IDs currently being worked on
                completedCount:
                  type: integer
                  description: Total beads completed by this guild
                podName:
                  type: string
                  description: Pod name for managed agents
                message:
                  type: string
                  description: Human-readable status message
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Mode
          type: string
          jsonPath: .spec.mode
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Work
          type: string
          jsonPath: .status.currentWork
        - name: Completed
          type: integer
          jsonPath: .status.completedCount
        - name: Last Seen
          type: date
          jsonPath: .status.lastSeen
