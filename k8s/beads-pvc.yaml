apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spire-beads-data
  namespace: spire
  labels:
    app.kubernetes.io/name: spire
    app.kubernetes.io/component: beads-storage
spec:
  accessModes:
    - ReadWriteOnce  # minikube: standard. production: switch to ReadWriteMany (NFS/EFS)
  resources:
    requests:
      storage: 5Gi
