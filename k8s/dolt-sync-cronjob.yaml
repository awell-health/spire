apiVersion: batch/v1
kind: CronJob
metadata:
  name: spire-dolt-sync
  namespace: spire
spec:
  schedule: "*/15 * * * *"  # Every 15 minutes
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: spire-steward
          containers:
          - name: syncer
            image: bitnami/kubectl:latest
            command: ["sh", "-c"]
            args:
            - |
              kubectl exec spire-dolt-0 -n spire -- sh -c \
                'cd /var/lib/dolt && dolt pull origin main && dolt push origin main'
