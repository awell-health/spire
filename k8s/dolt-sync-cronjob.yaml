apiVersion: batch/v1
kind: CronJob
metadata:
  name: spire-dolt-sync
  namespace: spire
spec:
  schedule: "*/15 * * * *"  # Every 15 minutes
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - name: syncer
            image: dolthub/dolt-sql-server:latest
            command: ["sh", "-c"]
            args:
            - |
              cd /var/lib/dolt && \
              dolt pull origin main && \
              dolt push origin main
            env:
            - name: DOLT_ROOT_PATH
              value: /var/lib/dolt
            envFrom:
            - secretRef:
                name: spire-credentials
            volumeMounts:
            - name: dolt-data
              mountPath: /var/lib/dolt
          volumes:
          - name: dolt-data
            persistentVolumeClaim:
              claimName: dolt-data-spire-dolt-0
