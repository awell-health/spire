name = "spire-agent-work"
description = "Standard agent work protocol: design → implement → review → merge."
version = 2

[phases.design]
timeout = "10m"
context = ["CLAUDE.md", "PLAYBOOK.md"]

[phases.implement]
timeout = "15m"
model = "claude-sonnet-4-6"
context = ["CLAUDE.md", "PLAYBOOK.md"]

[phases.review]
timeout = "10m"
model = "claude-opus-4-6"
context = ["CLAUDE.md"]

[phases.review.revision_policy]
max_rounds = 3
arbiter_model = "claude-opus-4-6"

[phases.merge]

[vars.task]
description = "The bead ID being worked on"
required = true
