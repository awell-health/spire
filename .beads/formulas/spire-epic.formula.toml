name = "spire-epic"
description = "Epic lifecycle: design validation, plan, wave-based implement, review with judgment, merge."
version = 2

[phases.design]
role = "wizard"
timeout = "1m"
max_turns = 1
# Wizard validates that a linked design bead (ref:) exists and is closed/sufficient.
# No Claude invocation — pure Go logic. Timeout is just a safety net.

[phases.plan]
role = "wizard"
timeout = "10m"
max_turns = 3
model = "claude-sonnet-4-6"
# Wizard invokes Claude with all context inline to generate subtask breakdown.

[phases.implement]
timeout = "10m"
model = "claude-sonnet-4-6"
role = "apprentice"
dispatch = "wave"
staging_branch = "epic/{bead-id}"
apprentice = true
worktree = true
context = ["CLAUDE.md", "PLAYBOOK.md"]

[phases.review]
timeout = "20m"
model = "claude-opus-4-6"
role = "sage"
verdict_only = true
judgment = true

[phases.review.revision_policy]
max_rounds = 3
arbiter_model = "claude-opus-4-6"

[phases.merge]
strategy = "squash"
staging_branch = "epic/{bead-id}"
auto = true

[vars.task]
description = "The epic bead ID"
required = true
