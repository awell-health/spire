project_name: spire

builds:
  - main: ./cmd/spire
    binary: spire
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: awell-health
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/awell-health/spire"
    description: "Coordination hub for AI agents across repositories"
    license: "Apache-2.0"
    dependencies:
      - name: beads
    install: |
      bin.install "spire"
    test: |
      assert_match version.to_s, shell_output("#{bin}/spire version")

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: awell-health
    name: spire

changelog:
  use: github-native
