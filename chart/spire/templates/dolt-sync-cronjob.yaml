{{- if and .Values.dolt.enabled .Values.tower.dolthub.remote }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: spire-dolt-sync
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spire.labels" . | nindent 4 }}
    app.kubernetes.io/component: dolt-sync
spec:
  schedule: {{ .Values.tower.dolthub.syncInterval | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "spire.labels" . | nindent 12 }}
            app.kubernetes.io/component: dolt-sync
        spec:
          restartPolicy: OnFailure
          serviceAccountName: spire-steward
          containers:
            - name: dolt-sync
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  kubectl exec spire-dolt-0 -n {{ .Release.Namespace }} -- sh -c \
                    'cd /var/lib/dolt && dolt pull origin main || true && dolt push origin main'
{{- end }}
