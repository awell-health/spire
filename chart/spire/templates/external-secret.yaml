{{- if .Values.secrets.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: spire-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spire.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.secrets.externalSecrets.secretStore }}
    kind: SecretStore
  target:
    name: spire-credentials
    creationPolicy: Owner
  data:
    - secretKey: anthropic-key
      remoteRef:
        key: spire/anthropic-key
    - secretKey: github-token
      remoteRef:
        key: spire/github-token
    - secretKey: dolthub-user
      remoteRef:
        key: spire/dolthub-user
    - secretKey: dolthub-password
      remoteRef:
        key: spire/dolthub-password
{{- end }}
