{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: spire-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spire.labels" . | nindent 4 }}
type: Opaque
stringData:
  anthropic-key: {{ .Values.secrets.anthropicKey | quote }}
  github-token: {{ .Values.secrets.githubToken | quote }}
  dolthub-user: {{ .Values.secrets.dolthubUser | quote }}
  dolthub-password: {{ .Values.secrets.dolthubPassword | quote }}
{{- end }}
