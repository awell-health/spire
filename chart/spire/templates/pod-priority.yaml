{{- if .Values.podPriority.enabled }}
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: spire-infrastructure
  labels:
    {{- include "spire.labels" . | nindent 4 }}
value: 2000000
globalDefault: false
description: "Priority class for Spire infrastructure components (steward, dolt, clickhouse)"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: spire-agent-p0
  labels:
    {{- include "spire.labels" . | nindent 4 }}
value: 1000000
globalDefault: false
description: "Priority class for P0 bead agent pods"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: spire-agent-default
  labels:
    {{- include "spire.labels" . | nindent 4 }}
value: 100000
globalDefault: false
description: "Priority class for normal agent pods"
{{- end }}
