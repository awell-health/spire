name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./cmd/spire/
      - name: Test
        run: go test ./pkg/... ./cmd/spire/... -count=1 -timeout 120s
      - name: Vet
        run: go vet ./...
