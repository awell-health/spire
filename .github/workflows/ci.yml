name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./cmd/spire

      - name: Unit tests
        run: go test ./cmd/spire/... -run "Test[^I]" -count=1

      - name: Vet
        run: go vet ./cmd/spire/...
