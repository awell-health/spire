name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # Apprentice validation gate (spi-q3lfd3 + spi-dx5621) runs only the
  # narrow `runtime.{test,build,lint}` commands in sandboxed cluster pods;
  # the broad cross-module drift surface — operator submodule, go.mod
  # normalization, RBAC marker-vs-generated, CRD copy drift — lives in
  # `runtime.ci_{test,build,lint}` and MUST be enforced here instead.
  # Keep these steps in sync with spire.yaml's ci_build / ci_lint / ci_test.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: CI build (mirrors runtime.ci_build)
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
          go build ./...
          cd operator
          go mod tidy
          git diff --exit-code -- go.mod go.sum
          go build ./...
      - name: CI test (mirrors runtime.ci_test)
        run: |
          go test ./... -count=1 -timeout 120s
          cd operator
          go test ./... -count=1 -timeout 120s
      - name: CI lint (mirrors runtime.ci_lint)
        run: |
          go vet ./...
          cd operator
          go vet ./...
          go generate ./api/...
          make verify-rbac
          cd ..
          git diff --exit-code helm/spire/crds/
      - name: CRD drift check (k8s/crds ↔ helm/spire/crds parity)
        run: make crd-check
      - name: Lifecycle gate (no new direct bead.status writes outside pkg/lifecycle)
        run: bash scripts/check-lifecycle-gate.sh

  # ClickHouse integration tests — runs the pkg/olap/clickhouse contract
  # suite against a real ClickHouse server. Isolated from the main
  # `build` job so the DuckDB unit tests stay on the happy path.
  clickhouse-integration:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24
        ports:
          - 9000:9000
          - 8123:8123
        env:
          CLICKHOUSE_DB: default
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ""
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Wait for ClickHouse
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8123/ping >/dev/null; then
              echo "ClickHouse is ready"
              exit 0
            fi
            echo "Waiting for ClickHouse ($i/30)..."
            sleep 2
          done
          echo "ClickHouse did not become ready in time" >&2
          exit 1
      - name: Run ClickHouse contract tests
        env:
          SPIRE_CLICKHOUSE_DSN: clickhouse://127.0.0.1:9000/spire_test
        run: go test -tags=integration -count=1 -timeout 120s ./pkg/olap/clickhouse/...

  tag-and-release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect unreleased version
        id: detect
        run: |
          for f in releases/v*.md; do
            [ -f "$f" ] || continue
            version="$(basename "$f" .md)"
            if ! git tag -l "$version" | grep -q .; then
              echo "version=$version" >> "$GITHUB_OUTPUT"
              echo "notes=$f" >> "$GITHUB_OUTPUT"
              echo "Found unreleased version: $version"
              exit 0
            fi
          done
          echo "No unreleased versions found"
      - name: Create tag
        if: steps.detect.outputs.version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.detect.outputs.version }}"
          git push origin "${{ steps.detect.outputs.version }}"
      - name: Trigger release
        if: steps.detect.outputs.version
        run: |
          gh workflow run release.yml \
            -f tag="${{ steps.detect.outputs.version }}" \
            -f notes="${{ steps.detect.outputs.notes }}"
        env:
          GH_TOKEN: ${{ secrets.CONTENTS_AND_WORKFLOWS_TOKEN }}
