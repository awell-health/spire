name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./cmd/spire/
      - name: Test
        run: go test ./pkg/... ./cmd/spire/... -count=1 -timeout 120s
      - name: Vet
        run: go vet ./...
      - name: CRD drift check
        run: make crd-check

  # ClickHouse integration tests — runs the pkg/olap/clickhouse contract
  # suite against a real ClickHouse server. Isolated from the main
  # `build` job so the DuckDB unit tests stay on the happy path.
  clickhouse-integration:
    runs-on: ubuntu-latest
    services:
      clickhouse:
        image: clickhouse/clickhouse-server:24
        ports:
          - 9000:9000
          - 8123:8123
        env:
          CLICKHOUSE_DB: default
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ""
          CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Wait for ClickHouse
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8123/ping >/dev/null; then
              echo "ClickHouse is ready"
              exit 0
            fi
            echo "Waiting for ClickHouse ($i/30)..."
            sleep 2
          done
          echo "ClickHouse did not become ready in time" >&2
          exit 1
      - name: Run ClickHouse contract tests
        env:
          SPIRE_CLICKHOUSE_DSN: clickhouse://127.0.0.1:9000/spire_test
        run: go test -tags=integration -count=1 -timeout 120s ./pkg/olap/clickhouse/...

  tag-and-release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect unreleased version
        id: detect
        run: |
          for f in releases/v*.md; do
            [ -f "$f" ] || continue
            version="$(basename "$f" .md)"
            if ! git tag -l "$version" | grep -q .; then
              echo "version=$version" >> "$GITHUB_OUTPUT"
              echo "notes=$f" >> "$GITHUB_OUTPUT"
              echo "Found unreleased version: $version"
              exit 0
            fi
          done
          echo "No unreleased versions found"
      - name: Create tag
        if: steps.detect.outputs.version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.detect.outputs.version }}"
          git push origin "${{ steps.detect.outputs.version }}"
      - name: Trigger release
        if: steps.detect.outputs.version
        run: |
          gh workflow run release.yml \
            -f tag="${{ steps.detect.outputs.version }}" \
            -f notes="${{ steps.detect.outputs.notes }}"
        env:
          GH_TOKEN: ${{ secrets.CONTENTS_AND_WORKFLOWS_TOKEN }}
