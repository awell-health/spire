name: Docker Dev Build

# Manual builds of the per-arch docker images without cutting a release.
# Intended for iterating on Dockerfile or pipeline changes. Images land at
# ghcr.io/awell-health/spire-<image>:<tag>-<arch> where <tag> defaults to
# dev-<sha7>.

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Which image to build"
        type: choice
        options: [all, agent, steward, builder]
        default: all
      arch:
        description: "Which arch"
        type: choice
        options: [arm64, amd64, both]
        default: arm64
      tag:
        description: "Image tag (default: dev-<sha7>)"
        required: false
      push:
        description: "Push to ghcr.io"
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(inputs.arch == 'both' && '["amd64","arm64"]' || format('["{0}"]', inputs.arch)) }}
        image: ${{ fromJSON(inputs.image == 'all' && '["agent","steward","builder"]' || format('["{0}"]', inputs.image)) }}
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=dev-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build ${{ matrix.image }} (${{ matrix.arch }})
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.${{ matrix.image }}
          platforms: linux/${{ matrix.arch }}
          push: ${{ inputs.push }}
          tags: ghcr.io/awell-health/spire-${{ matrix.image }}:${{ steps.tag.outputs.value }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}
