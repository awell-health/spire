apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: wizardguilds.spire.awell.io
spec:
  group: spire.awell.io
  names:
    kind: WizardGuild
    listKind: WizardGuildList
    plural: wizardguilds
    singular: wizardguild
    shortNames:
      - wg
      - guild
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [mode]
              properties:
                displayName:
                  type: string
                  description: Human-readable name for the guild
                mode:
                  type: string
                  enum: [external, managed]
                  description: |
                    external: agent runs on a dev machine, operator only sends messages.
                    managed: operator creates and manages a pod for this guild.
                capabilities:
                  type: array
                  items:
                    type: string
                  description: Skills/technologies this guild can work with
                prefixes:
                  type: array
                  items:
                    type: string
                  description: Bead prefixes this guild can claim work from
                token:
                  type: string
                  default: default
                  description: Name of the Anthropic token to use (references SpireConfig)
                maxConcurrent:
                  type: integer
                  default: 1
                  description: Max beads this guild can work on simultaneously
                maxApprentices:
                  type: integer
                  minimum: 1
                  description: |
                    Max concurrent apprentice subprocesses spawned by a single
                    wizard pod during wave dispatch. When unset, the operator
                    leaves SPIRE_MAX_APPRENTICES unset on the pod and the
                    wizard falls back to spire.yaml agent.max-apprentices,
                    then the built-in default (3).
                # Managed mode fields
                image:
                  type: string
                  description: Container image for managed agents
                repo:
                  type: string
                  description: Git repo URL for managed agents to clone
                repoBranch:
                  type: string
                  default: main
                  description: Branch to clone
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    limits:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                cache:
                  type: object
                  required: [size]
                  description: |
                    Guild-owned repo cache. Declaring this opts the guild
                    into the phase-2 cluster repo-cache contract: the
                    operator reconciles a PVC and refresh Job, and wizard
                    pods derive their read-only repo substrate from the
                    cache instead of cloning from origin.

                    Repo identity is NOT declared here — it stays
                    authoritative via tower/shared registration. This
                    spec only governs the storage and refresh contract.
                  properties:
                    storageClassName:
                      type: string
                      description: |
                        StorageClass used for the cache PVC. When empty,
                        the operator falls back to the cluster default.
                    size:
                      type: string
                      description: |
                        Requested PVC capacity as a Kubernetes
                        resource.Quantity (e.g. "10Gi").
                    accessMode:
                      type: string
                      default: ReadOnlyMany
                      description: |
                        PVC access mode. Defaults to ReadOnlyMany so many
                        wizard pods can mount the same cache in parallel.
                    refreshInterval:
                      type: string
                      default: 5m
                      description: |
                        How often the operator schedules a fetch against
                        the cache. Defaults to 5m.
                    branchPin:
                      type: string
                      description: |
                        When set, constrains the cache to this branch.
                        When unset, the cache tracks the guild's default
                        branch.
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Idle, Working, Stale, Offline, Provisioning]
                registered:
                  type: boolean
                lastSeen:
                  type: string
                  format: date-time
                currentWork:
                  type: array
                  items:
                    type: string
                  description: Bead IDs currently being worked on
                completedCount:
                  type: integer
                  description: Total beads completed by this guild
                podName:
                  type: string
                  description: Pod name for managed agents
                message:
                  type: string
                  description: Human-readable status message
                cache:
                  type: object
                  description: |
                    Observed state of the guild-owned repo cache. Nil
                    when Spec.Cache is unset.
                  properties:
                    phase:
                      type: string
                      enum: [Pending, Ready, Refreshing, Failed]
                      description: Cache lifecycle phase.
                    revision:
                      type: string
                      description: |
                        Git commit SHA the cache currently points at.
                        Empty until the first successful refresh.
                    lastRefreshTime:
                      type: string
                      format: date-time
                      description: When the cache was most recently refreshed.
                    refreshError:
                      type: string
                      description: |
                        Human-readable description of the most recent
                        refresh failure, if any. Cleared on the next
                        successful refresh.
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Mode
          type: string
          jsonPath: .spec.mode
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Work
          type: string
          jsonPath: .status.currentWork
        - name: Completed
          type: integer
          jsonPath: .status.completedCount
        - name: Last Seen
          type: date
          jsonPath: .status.lastSeen
