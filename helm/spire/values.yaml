# Spire Helm chart values
# Override any of these in your own values file or with --set.

# -- Kubernetes namespace to deploy into
namespace: spire

# -- Container image registry and tags
images:
  steward:
    repository: ghcr.io/awell-health/spire-steward
    tag: latest
    pullPolicy: IfNotPresent
  agent:
    repository: ghcr.io/awell-health/spire-agent
    tag: latest
    pullPolicy: IfNotPresent
  dolt:
    repository: dolthub/dolt-sql-server
    tag: latest
    pullPolicy: IfNotPresent

# -- DoltHub remote configuration (required)
dolthub:
  # DoltHub remote path (e.g. "your-org/your-tower")
  remote: ""
  # Credentials — set via --set or a separate secret
  user: ""
  password: ""

# -- Anthropic API key for agent LLM calls (required)
anthropic:
  apiKey: ""

# -- Optional: GitHub token for repo operations
github:
  token: ""

# -- Optional: Linear API key for epic sync
linear:
  apiKey: ""

# -- Prefix for the hub beads in this cluster
beads:
  prefix: "spi"

# -- Steward configuration
steward:
  interval: "2m"
  backend: "k8s"
  metricsPort: 9090
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# -- Operator configuration
operator:
  interval: "30s"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# -- Dolt database configuration
dolt:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage:
    size: 5Gi
    # storageClass: "" # leave empty to use cluster default

# -- Steward persistent storage
stewardStorage:
  size: 1Gi
  # storageClass: ""

# -- SpireConfig: polling and token routing
spireConfig:
  polling:
    interval: "2m"
    staleThreshold: "4h"
    reassignThreshold: "6h"
  defaultToken: default

# -- Agent definitions
# Each entry creates a SpireAgent CR that the operator manages.
# agents:
#   - name: my-repo-agent
#     mode: managed
#     repo: https://github.com/your-org/my-repo.git
#     repoBranch: main
#     prefixes: ["myp-"]
#     maxConcurrent: 2
#     capabilities: ["implement"]
#     resources:
#       requests:
#         memory: "256Mi"
#         cpu: "100m"
#       limits:
#         memory: "1Gi"
#         cpu: "500m"
agents: []

# -- Syncer CronJob: runs spire pull && spire push on a schedule.
# Enable this if you want the cluster to sync DoltHub without the daemon.
syncer:
  enabled: false
  schedule: "*/2 * * * *"
