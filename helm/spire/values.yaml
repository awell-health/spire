# Spire Helm chart values
# Override any of these in your own values file or with --set.

## @section Global parameters

## @param namespace Kubernetes namespace to deploy into
namespace: spire

## @param createNamespace Whether the chart should render a Namespace resource.
## Set to false when using `helm install --create-namespace` or when the
## namespace is pre-created and managed outside the chart. Defaults to true
## for backward compatibility.
createNamespace: true

## @section Filesystem paths
##
## The PVC mount point is the only externally-observable path knob. Every
## other persistent path used by Spire in-cluster — the per-database dolt
## data dir, the `.beads/` workspace, the tower config dir that
## `spire tower attach-cluster` writes and the main container reads — is
## derived as a subpath of this root via chart helpers
## (`spire.dbDataDir`, `spire.beadsDir`, `spire.configDir`), so the chart
## cannot ship with two paths silently out of sync. Override this only
## when the deploy target needs a different mount location (different
## volume, path-based pod-security policy, etc).

## @param paths.dataRoot Mount point for the persistent volume and root of all derived paths.
paths:
  dataRoot: /data

## @section Image configuration
##
## Container image registry and tags for spire-managed workloads. Image tags
## default to "" which resolves to .Chart.AppVersion at render time — this
## means `helm install` on a published chart pins to the release version
## automatically, without needing `--set *.tag=...` flags. The dolt image is
## pulled from upstream (dolthub/dolt-sql-server) and uses its own versioning.

## @param images.steward.repository Docker image repository for the steward/operator/sidecar/syncer
## @param images.steward.tag Steward image tag. Defaults to .Chart.AppVersion if empty.
## @param images.steward.pullPolicy Steward image pull policy
## @param images.agent.repository Docker image repository for apprentice agents
## @param images.agent.tag Agent image tag. Defaults to .Chart.AppVersion if empty.
## @param images.agent.pullPolicy Agent image pull policy
## @param images.dolt.repository Docker image repository for the dolt SQL server (upstream)
## @param images.dolt.tag Dolt image tag (upstream, not tied to chart appVersion)
## @param images.dolt.pullPolicy Dolt image pull policy
images:
  steward:
    repository: ghcr.io/awell-health/spire-steward
    tag: ""  # Defaults to .Chart.AppVersion if empty
    pullPolicy: IfNotPresent
  agent:
    repository: ghcr.io/awell-health/spire-agent
    tag: ""  # Defaults to .Chart.AppVersion if empty
    pullPolicy: IfNotPresent
  dolt:
    repository: dolthub/dolt-sql-server
    tag: latest
    pullPolicy: IfNotPresent

## @section DoltHub remote configuration
##
## DoltHub is the source of truth for beads. The chart clones from this
## remote on first boot and pushes/pulls on the configured cadence.

## @param dolthub.remoteUrl DoltHub remote path (e.g. "your-org/your-tower"). Required.
## @param dolthub.user Dual-purpose username. (1) DoltHub CLI placeholder — HTTPS clone/pull/push to DoltHub authenticates via the JWK below, not this field. (2) SQL username the post-install provisioning Job creates inside the cluster's dolt server as the remotesapi login. It's rendered into the Secret as DOLT_REMOTE_USER, and the provision Job reads the same key — so set this to the username laptops will use when they `dolt clone --user=<here> http://…:<remotesapiPort>/<db>`. Example: `dolt_remote`.
## @param dolthub.password Dual-purpose password. (1) DoltHub CLI placeholder (not used for HTTPS auth; the JWK handles that). (2) Password for the cluster-side remotesapi SQL user provisioned by the post-install Job, rendered into the Secret as DOLT_REMOTE_PASSWORD. MUST NOT contain a single quote (') — the provisioning Job rejects such passwords to avoid shell/SQL quoting pitfalls. (Our generator in k8s/setup-dolt-users.sh also strips `/+=` for the same reason.) Rotate by `helm upgrade --set dolthub.password=<new>`; the Job re-runs and `ALTER USER` takes effect.
## @param dolthub.credsKeyId Dolt key ID (base32 string shown by `dolt creds ls`). Basename of the JWK file in the chart-managed Secret, and the argument to `dolt creds use`.
## @param dolthub.credsKeyValue Raw JWK JSON contents of `~/.dolt/creds/<credsKeyId>.jwk`. Pass with `--set-file dolthub.credsKeyValue=<path>` so helm reads the file.
## @param dolthub.userName Dolt CLI `user.name` config. Must match the DoltHub account that owns the credential key — NOT an arbitrary display name. DoltHub's auth enforces this on fetch/pull (not on clone, which is why clone-only tests miss it). For the `awell/awell` tower this is `awell`.
## @param dolthub.userEmail Dolt CLI `user.email` config. Email associated with the DoltHub account.
dolthub:
  # DoltHub remote path (e.g. "your-org/your-tower")
  remoteUrl: ""
  # DoltHub CLI placeholder AND the SQL username the post-install Job
  # creates inside the cluster's dolt for remotesapi auth. HTTPS traffic
  # to DoltHub authenticates via the JWK below; this field is what
  # laptops pass as `dolt clone --user=<here> http://…:<remotesapiPort>/<db>`.
  user: ""
  # Password for the cluster-side remotesapi SQL user (rendered into
  # Secret as DOLT_REMOTE_PASSWORD). Must not contain a single quote.
  password: ""
  # The Dolt key ID (base32 string shown by `dolt creds ls`).
  credsKeyId: ""
  # Raw JWK JSON string for the private key.
  credsKeyValue: ""
  # Dolt CLI user.name — must match the DoltHub account that owns the key.
  userName: ""
  # Dolt CLI user.email — the account's email.
  userEmail: ""

## @section Agent credentials
##
## Credentials used by apprentice agents running in the cluster. Provide the
## ones you use — e.g. only `anthropic.oauthToken` if you run Claude agents
## on a Max/Team subscription.

## @param anthropic.apiKey Anthropic classic API key (mutually exclusive with oauthToken).
## @param anthropic.oauthToken Anthropic OAuth token from `claude setup-token` on a Max/Team subscription (starts with sk-ant-oat01-...).
anthropic:
  apiKey: ""
  oauthToken: ""

## @param openai.apiKey OpenAI API key for the codex provider.
openai:
  apiKey: ""

## @param github.token GitHub token for repo operations (clone, PR, push).
github:
  token: ""

## @param linear.apiKey Linear API key for epic sync.
linear:
  apiKey: ""

# -- Additional credentials not covered above. Rendered into the same
# secret as the top-level credential blocks. Keep empty if unused.
credentials:
  # Codex provider API key. Distinct env var from OPENAI_API_KEY so
  # callers can route codex traffic through a separate key without
  # reconfiguring the openai provider.
  codex:
    apiKey: ""
  # OAuth client credentials for integrations that register their own
  # OAuth app (as opposed to using Spire's shared client).
  oauth:
    linear:
      clientId: ""
      clientSecret: ""

# -- If set, the chart will NOT render spire-credentials and will instead
# reference an externally-created Secret with this name. Useful for prod
# installs where secrets are managed outside helm (sealed-secrets,
# external-secrets-operator, vault-injector, etc.). The external secret
# must contain the same keys the chart would render.
existingSecret: ""

## @section Bead / tenant configuration

## @param beads.prefix Bead ID prefix for this tenant (e.g. "spi" → spi-abc123).
## @param beads.database Local dolt database name. Defaults to prefix when empty. Must match what `dolt clone` creates on disk and what bd's metadata.json looks up via SQL.
beads:
  prefix: "spi"
  database: ""

## @section Steward configuration

## @param steward.interval Steward poll interval.
## @param steward.backend Steward execution backend (k8s | docker | process).
## @param steward.metricsPort HTTP port the steward exposes /livez, /readyz, /metrics on.
## @param steward.resources.requests.cpu Steward CPU request.
## @param steward.resources.requests.memory Steward memory request.
## @param steward.resources.limits.cpu Steward CPU limit.
## @param steward.resources.limits.memory Steward memory limit.
steward:
  # Main steward cycle interval. 10s is cheap because each cycle is just
  # dolt SQL reads (no LLM). Tighter intervals give faster reaction to
  # newly-ready beads and to stale-wizard detection.
  interval: "10s"
  backend: "k8s"
  metricsPort: 9090
  # LLM model for the sidecar (message router / condition tracker).
  # haiku-4-5 handles routine routing well; bump to sonnet/opus only if
  # directives become nuanced enough to warrant it.
  sidecarModel: "claude-haiku-4-5-20251001"
  # Sidecar inbox-poll interval. Safe to keep tight because the sidecar
  # now skips the LLM call entirely when the inbox + tracking + pending
  # are all empty — idle rounds cost zero Anthropic tokens.
  sidecarPollInterval: "10s"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

## @section Operator configuration

## @param operator.interval Operator reconcile interval.
## @param operator.resources.requests.cpu Operator CPU request.
## @param operator.resources.requests.memory Operator memory request.
## @param operator.resources.limits.cpu Operator CPU limit.
## @param operator.resources.limits.memory Operator memory limit.
operator:
  interval: "30s"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

## @section Dolt database configuration

## @param dolt.port MySQL-protocol port the dolt server listens on.
## @param dolt.remotesapiPort Port for dolt's remote API (makes the server act as a dolt-remote endpoint — laptops can `dolt remote add cluster dolt://<svc>:<port>/<db>` and push/pull directly against this cluster instead of DoltHub).
## @param dolt.provisionRemoteUser.enabled Render a post-install/post-upgrade Job that creates (and re-ALTERs) the SQL user matching DOLT_REMOTE_USER/DOLT_REMOTE_PASSWORD in the Secret, so remotesapi clients can authenticate out-of-the-box. Leave on for a clean zero-manual-step install; disable to provision users yourself (e.g. via k8s/setup-dolt-users.sh for multi-role setups). When using `existingSecret`, that Secret MUST provide both DOLT_REMOTE_USER and DOLT_REMOTE_PASSWORD keys or the Job will fail.
## @param dolt.additionalUsers Extra SQL users to provision alongside the primary `dolt_remote` user, useful when laptops/CI want their own remotesapi credentials (per-user audit, independent rotation) without hand-running `CREATE USER`. Each entry: `name` (SQL username, validated against `^[a-zA-Z0-9_]{1,32}$` at render time), `host` (defaults to `%`), a password source (either `passwordSecret: { name, key }` referencing an operator-managed Secret — preferred — or inline `password: "..."` which the chart materializes into a per-release Secret), `grants` (list of SQL GRANT clauses, e.g. `ALL ON spi.*`). Renders a second post-install/post-upgrade Job that runs idempotent `CREATE USER IF NOT EXISTS … ALTER USER … GRANT …` for every entry. Leaving the default empty list renders no extra resources. Single-quote characters are rejected in host/grants/passwords; invalid names fail the Helm render.
## @param dolt.resources.requests.cpu Dolt CPU request.
## @param dolt.resources.requests.memory Dolt memory request.
## @param dolt.resources.limits.cpu Dolt CPU limit.
## @param dolt.resources.limits.memory Dolt memory limit.
## @param dolt.storage.size Size of the PVC backing the dolt StatefulSet.
## @param dolt.storage.storageClass StorageClass for the dolt PVC. Leave empty to use the cluster default.
dolt:
  # Port the dolt SQL server listens on inside the pod. The service
  # exposes the same port. Kept separate from any host-side tooling
  # port so the chart can be tuned without touching client config.
  port: 3306
  # Port for the dolt remotes API — when set, the dolt server acts as
  # its own dolt-remote endpoint. Laptops can then run
  #   dolt remote add cluster http://<host>:<port>/<db>
  # and push/pull directly against the cluster, skipping DoltHub in
  # the inner loop. See docs/sql-reference/server/configuration for
  # the `remotesapi` block.
  remotesapiPort: 50051
  # Chart-managed creation of the SQL user that matches DOLT_REMOTE_USER/
  # DOLT_REMOTE_PASSWORD in the Secret. Runs as a post-install and
  # post-upgrade helm hook against the live dolt SQL server, so password
  # rotations propagate on `helm upgrade`. Disable if you provision dolt
  # users out-of-band (e.g. via k8s/setup-dolt-users.sh for multi-role
  # setups).
  provisionRemoteUser:
    enabled: true
  # Extra SQL users provisioned alongside the primary `dolt_remote` user.
  # Use when laptops/CI want per-user remotesapi credentials (audit,
  # independent rotation) without hand-running `CREATE USER`. The chart
  # renders a second post-install/post-upgrade Job that runs idempotent
  # CREATE/ALTER/GRANT for every entry. Leave empty to render nothing.
  #
  # Each entry:
  #   name           — SQL username. Required. Validated at render time
  #                    against `^[a-zA-Z0-9_]{1,32}$`; anything else
  #                    (semicolons, quotes, spaces, >32 chars) fails the
  #                    Helm render with a clear error.
  #   host           — SQL host pattern. Optional, defaults to "%" (any
  #                    host). Must not contain a single quote.
  #   passwordSecret — Secret-ref password source (preferred). An object
  #                    with `name` (Secret name in the release namespace)
  #                    and optional `key` (default "password"). The
  #                    Secret must exist before the Job Pod schedules.
  #   password       — Inline password. Materialized into a
  #                    chart-managed Secret named
  #                    `spire-dolt-additional-users` with key
  #                    `addl-pw-<name>` so it never appears in the Job
  #                    manifest. Must not contain a single quote. Use
  #                    `passwordSecret` for anything but demo/dev.
  #   grants         — List of SQL GRANT clauses (e.g. "ALL ON spi.*").
  #                    Must not contain a single quote. Applied every
  #                    run; grant revocation on removal is NOT handled
  #                    — drop the user by hand with DROP USER if
  #                    you remove an entry.
  #
  # Exactly one of passwordSecret or password must be set per entry —
  # render fails otherwise.
  additionalUsers: []
  # - name: alice
  #   passwordSecret:
  #     name: spire-user-alice
  #     key: password
  #   grants:
  #     - "ALL ON spi.*"
  # - name: readonly
  #   password: "plaintext-discouraged"
  #   grants:
  #     - "SELECT ON spi.*"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage:
    size: 5Gi
    # storageClass: "" # leave empty to use cluster default

## @section Steward persistent storage

## @param stewardStorage.size Size of the PVC backing the steward /data volume.
## @param stewardStorage.storageClass StorageClass for the steward PVC. Leave empty to use the cluster default.
stewardStorage:
  size: 1Gi
  # storageClass: ""

## @section SpireConfig (polling and token routing)

## @param spireConfig.polling.interval SpireConfig poll interval.
## @param spireConfig.polling.staleThreshold How long before an in_progress bead is considered stale.
## @param spireConfig.polling.reassignThreshold How long before a stale bead is reassigned.
## @param spireConfig.defaultToken Default token label for tenant-scoped credentials.
spireConfig:
  polling:
    interval: "2m"
    staleThreshold: "4h"
    reassignThreshold: "6h"
  defaultToken: default

## @section Guild definitions
##
## Each entry creates a WizardGuild CR that the operator manages.
##
## BREAKING CHANGE (spi-iaw8q): the SpireAgent CRD was replaced by WizardGuild.
## No migration tooling is shipped — upgrades from charts that deployed the
## old `spireagents.spire.awell.io` CRD require `helm uninstall && helm install`.
## Decision per archmage on bead spi-iaw8q (2026-04-20): no production users
## yet, so direct replacement is the rollout mechanism in lower environments.
##
## Naming convention: the `name` is the guild's shortname. It is used verbatim
## as the CR name and as the prefix for every wizard pod spawned under the
## guild (`<name>-wizard-<bead>`). Keep it short, lowercase, and DNS-safe.
## For a single-guild tower, `main` is the recommended default.
##
## Example:
##   guilds:
##     - name: main
##       mode: managed
##       repo: https://github.com/your-org/my-repo.git
##       repoBranch: main
##       prefixes: ["myp-"]
##       maxConcurrent: 2
##       resources:
##         requests:
##           memory: "256Mi"
##           cpu: "100m"
##         limits:
##           memory: "1Gi"
##           cpu: "500m"

## @param guilds List of WizardGuild CRs to render. Default is empty; operators
## supply guilds per deployment. See section header for naming convention.
guilds: []

## @section Syncer
##
## Long-running Deployment that runs `spire pull && spire push` on a loop.
## Bridges the cluster's dolt DB and DoltHub so laptop work becomes visible
## in-cluster and cluster work flows back out. Was a CronJob before, but
## k8s CronJob cannot schedule sub-minute intervals — and 10s is the right
## cadence for dogfooding.

## @param syncer.enabled Whether to render the syncer Deployment + Service. Default false — Phase 1 does not need a DoltHub-sync loop because the cluster's dolt serves its own remotesapi. Re-enable when archival DoltHub sync is wanted (Phase 2).
## @param syncer.interval Background sync interval when the syncer is enabled.
## @param syncer.debounce Minimum time between triggered syncs. Rapid POSTs to /sync coalesce within this window.
## @param syncer.port HTTP port the syncer's gateway endpoint listens on (exposed as the spire-syncer Service).
syncer:
  enabled: true
  interval: "1m"
  debounce: "5s"
  port: 8082

## @section Dolt backups (GCS)
##
## Phase-1 disaster-recovery path: a CronJob that runs `dolt backup sync`
## against a GCS bucket. The backup target is registered once by the
## dolt-init script (`dolt backup add <name> gs://...`) so every install
## is self-contained. Retention (30-day deletion) is enforced by a GCS
## bucket lifecycle rule, NOT by the chart — Helm has no native way to
## reconcile GCS bucket policies. Configure the lifecycle rule once on
## the bucket, out-of-band, e.g.:
##   gsutil lifecycle set lifecycle.json gs://<bucket>
## with a rule that deletes objects older than `retentionDays` days.
##
## Credentials rotation: the GCS service-account JSON is mounted into
## the dolt pod as GOOGLE_APPLICATION_CREDENTIALS. Rotating the JSON
## requires restarting the dolt StatefulSet.

## @param backup.enabled Whether to render the GCS backup resources (CronJob, Secret, RBAC, dolt-side volume/env). Off by default — Phase-1 opt-in.
## @param backup.schedule Cron expression for the backup CronJob. Default is daily at 03:00 UTC.
## @param backup.remoteName Name of the dolt backup remote registered by dolt-init (`dolt backup add <name> <url>`). Must match what the CronJob syncs.
## @param backup.gcs.bucket GCS bucket name (without `gs://`). Required when backup.enabled=true.
## @param backup.gcs.prefix Optional path prefix inside the bucket. Final URL is `gs://<bucket>/<prefix>`. Empty = bucket root.
## @param backup.gcs.serviceAccountJson Raw JSON of a GCS service-account key with objectAdmin on the bucket. Pass via `--set-file backup.gcs.serviceAccountJson=sa.json`.
## @param backup.retentionDays Documentation-only. Enforced by a GCS bucket lifecycle rule configured out-of-band — the chart does not manage it.
## @param backup.resources.requests.cpu CronJob trigger-container CPU request (tiny kubectl-exec workload).
## @param backup.resources.requests.memory CronJob trigger-container memory request.
## @param backup.resources.limits.cpu CronJob trigger-container CPU limit.
## @param backup.resources.limits.memory CronJob trigger-container memory limit.
backup:
  enabled: false
  schedule: "0 3 * * *"   # daily 03:00 UTC
  remoteName: "gcs-backup"
  gcs:
    bucket: ""            # e.g. "awell-spire-backups"
    prefix: ""            # e.g. "prod/spi" → gs://bucket/prefix
    serviceAccountJson: "" # raw JSON, pass via --set-file
  # Retention is enforced by a GCS bucket lifecycle rule. The chart does
  # NOT manage this — configure it out-of-band:
  #   gsutil lifecycle set lifecycle.json gs://<bucket>
  retentionDays: 30       # doc-only; not applied by the chart
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

## @section Namespace resource quota
##
## Optional ResourceQuota + LimitRange for the release namespace. When
## enabled, the chart reserves namespace-wide capacity up front instead
## of letting pods race the scheduler, and sets per-container defaults
## so a misconfigured guild can't starve others.
##
## Schema note: the bead title calls out `quota.{enabled,requests,limits}`.
## A ResourceQuota also needs a pod count cap, and a LimitRange needs
## min/max/default per container — those don't fit semantically under
## `requests`/`limits`, so they live under `pods` and `podLimits`. Don't
## "fix" the schema by folding them in.
##
## LimitRange note: `type: Container` (not `Pod`). Kubernetes only
## auto-injects default requests/limits onto containers for the Container
## type — Pod-typed LimitRanges only validate pod totals.

## @param quota.enabled Render a ResourceQuota + LimitRange for the namespace. Off by default.
## @param quota.requests.cpu Namespace-wide cap on sum of container CPU requests.
## @param quota.requests.memory Namespace-wide cap on sum of container memory requests.
## @param quota.limits.cpu Namespace-wide cap on sum of container CPU limits.
## @param quota.limits.memory Namespace-wide cap on sum of container memory limits.
## @param quota.pods Maximum number of pods in the namespace.
## @param quota.podLimits.max.cpu Maximum CPU a single container may request/limit.
## @param quota.podLimits.max.memory Maximum memory a single container may request/limit.
## @param quota.podLimits.min.cpu Minimum CPU a single container may request.
## @param quota.podLimits.min.memory Minimum memory a single container may request.
## @param quota.podLimits.default.cpu Default CPU limit injected when a container doesn't set one.
## @param quota.podLimits.default.memory Default memory limit injected when a container doesn't set one.
## @param quota.podLimits.defaultRequest.cpu Default CPU request injected when a container doesn't set one.
## @param quota.podLimits.defaultRequest.memory Default memory request injected when a container doesn't set one.
quota:
  enabled: false
  requests:
    cpu: "4"
    memory: "8Gi"
  limits:
    cpu: "8"
    memory: "16Gi"
  pods: "50"
  podLimits:
    max:
      cpu: "2"
      memory: "4Gi"
    min:
      cpu: "10m"
      memory: "32Mi"
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
