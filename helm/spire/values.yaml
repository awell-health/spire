# Spire Helm chart values
# Override any of these in your own values file or with --set.

# -- Kubernetes namespace to deploy into
namespace: spire

# -- Whether the chart should render a Namespace resource. Set to false when
# using `helm install --create-namespace` or when the namespace is pre-created
# and managed outside the chart. Defaults to true for backward compatibility.
createNamespace: true

# -- Container image registry and tags
images:
  steward:
    repository: ghcr.io/awell-health/spire-steward
    tag: latest
    pullPolicy: IfNotPresent
  agent:
    repository: ghcr.io/awell-health/spire-agent
    tag: latest
    pullPolicy: IfNotPresent
  dolt:
    repository: dolthub/dolt-sql-server
    tag: latest
    pullPolicy: IfNotPresent

# -- DoltHub remote configuration (required)
dolthub:
  # DoltHub remote path (e.g. "your-org/your-tower")
  remote: ""
  # DoltHub user — kept for completeness, but HTTPS clone/pull/push
  # authenticates via the JWK file below, not user/password.
  user: ""
  password: ""
  # Name of an externally-created k8s Secret with one or more .jwk
  # credential files from your local `~/.dolt/creds/`. Required for
  # DoltHub clone/pull/push — env-var auth is not sufficient. Create with:
  #   kubectl -n <ns> create secret generic dolt-creds \
  #     --from-file=<keyid>.jwk=$HOME/.dolt/creds/<keyid>.jwk
  credsSecretName: ""
  # DOLT_CREDS_KEY_ID: filename (without .jwk) of the key to use from
  # credsSecretName. Must exactly match a file in that Secret.
  keyId: ""

# -- Anthropic credentials. Provide ONE of apiKey or oauthToken.
# oauthToken is from `claude setup-token` on a Max/Team subscription
# (starts with sk-ant-oat01-...). apiKey is a classic API key.
anthropic:
  apiKey: ""
  oauthToken: ""

# -- Optional: OpenAI API key for codex provider
openai:
  apiKey: ""

# -- Optional: GitHub token for repo operations
github:
  token: ""

# -- Optional: Linear API key for epic sync
linear:
  apiKey: ""

# -- If set, the chart will NOT render spire-credentials and will instead
# reference an externally-created Secret with this name. Useful for prod
# installs where secrets are managed outside helm (sealed-secrets,
# external-secrets-operator, vault-injector, etc.). The external secret
# must contain the same keys the chart would render.
existingSecret: ""

# -- Bead configuration for this tenant
beads:
  # Bead ID prefix (e.g. "spi" → spi-abc123)
  prefix: "spi"
  # Local dolt database name. Defaults to prefix. Must match what `dolt clone`
  # creates on disk and what bd's metadata.json looks up via SQL.
  database: ""

# -- Steward configuration
steward:
  interval: "2m"
  backend: "k8s"
  metricsPort: 9090
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# -- Operator configuration
operator:
  interval: "30s"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# -- Dolt database configuration
dolt:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage:
    size: 5Gi
    # storageClass: "" # leave empty to use cluster default

# -- Steward persistent storage
stewardStorage:
  size: 1Gi
  # storageClass: ""

# -- SpireConfig: polling and token routing
spireConfig:
  polling:
    interval: "2m"
    staleThreshold: "4h"
    reassignThreshold: "6h"
  defaultToken: default

# -- Agent definitions
# Each entry creates a SpireAgent CR that the operator manages.
# agents:
#   - name: my-repo-agent
#     mode: managed
#     repo: https://github.com/your-org/my-repo.git
#     repoBranch: main
#     prefixes: ["myp-"]
#     maxConcurrent: 2
#     capabilities: ["implement"]
#     resources:
#       requests:
#         memory: "256Mi"
#         cpu: "100m"
#       limits:
#         memory: "1Gi"
#         cpu: "500m"
agents: []

# -- Syncer CronJob: runs spire pull && spire push on a schedule.
# Enable this if you want the cluster to sync DoltHub without the daemon.
syncer:
  enabled: false
  schedule: "*/2 * * * *"
