# Spire Helm chart — GKE overlay
#
# Use with: `helm upgrade --install spire -n spire helm/spire -f values.gke.yaml`
# then layer your own overlay on top for secrets, hosts, and cluster-specific
# knobs. Settings left commented out here are opt-in examples; uncomment and
# adapt to your environment.

