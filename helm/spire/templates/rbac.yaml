apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-operator
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spire-operator
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
  - apiGroups: ["spire.awell.io"]
    resources: ["spireagents", "spireworkloads", "spireconfigs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["spire.awell.io"]
    resources: ["spireagents/status", "spireworkloads/status", "spireconfigs/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spire-operator
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: spire-operator
subjects:
  - kind: ServiceAccount
    name: spire-operator
    namespace: {{ .Values.namespace }}
{{- if .Values.syncer.enabled }}
---
# RBAC for dolt-sync — needs pods/exec to run dolt commands inside the dolt pod
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-dolt-sync
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-dolt-sync
    app.kubernetes.io/managed-by: {{ .Release.Service }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spire-dolt-sync
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-dolt-sync
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
  # Need to find the dolt pod
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Need to kubectl exec into it
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spire-dolt-sync
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-dolt-sync
    app.kubernetes.io/managed-by: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spire-dolt-sync
subjects:
  - kind: ServiceAccount
    name: spire-dolt-sync
    namespace: {{ .Values.namespace }}
{{- end }}
{{- if .Values.backup.enabled }}
---
# RBAC for dolt-backup CronJob — needs pods/exec to run
# `dolt backup sync` inside the dolt pod (same pattern as dolt-sync).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-dolt-backup
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-dolt-backup
    app.kubernetes.io/managed-by: {{ .Release.Service }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spire-dolt-backup
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-dolt-backup
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
  # Need to find the dolt pod
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Need to kubectl exec into it
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spire-dolt-backup
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-dolt-backup
    app.kubernetes.io/managed-by: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spire-dolt-backup
subjects:
  - kind: ServiceAccount
    name: spire-dolt-backup
    namespace: {{ .Values.namespace }}
{{- end }}
