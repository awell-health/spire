apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-operator
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
---
# Cluster-scoped RBAC names are release-scoped so that multiple helm
# releases in one cluster don't collide. The ServiceAccount (above)
# stays namespace-scoped and keeps the stable name `spire-operator`
# because Deployments/StatefulSets reference it by that name.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-operator
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
# Rules MUST stay in strict parity with operator/config/rbac/role.yaml
# (the controller-gen output from the +kubebuilder:rbac markers on each
# controller). scripts/verify-rbac-parity.sh runs in apprentice
# validation and fails on any drift in either direction — adding a
# verb here that no marker declares is as much a regression as a marker
# that the chart doesn't ship. When the generated role changes, update
# this list to match (both directions strictly equal).
rules:
  - apiGroups: ["spire.awell.io"]
    resources: ["wizardguilds"]
    verbs: ["get", "list", "watch", "update"]
  - apiGroups: ["spire.awell.io"]
    resources: ["wizardguilds/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["spire.awell.io"]
    resources: ["spireworkloads"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: ["spire.awell.io"]
    resources: ["spireworkloads/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["spire.awell.io"]
    resources: ["spireconfigs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-operator
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-operator
subjects:
  - kind: ServiceAccount
    name: spire-operator
    namespace: {{ .Values.namespace }}
{{- if .Values.syncer.enabled }}
---
# RBAC for dolt-sync — needs pods/exec to run dolt commands inside the dolt pod
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-dolt-sync
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-dolt-sync
    app.kubernetes.io/managed-by: {{ .Release.Service }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spire-dolt-sync
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-dolt-sync
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
  # Need to find the dolt pod
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Need to kubectl exec into it
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spire-dolt-sync
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-dolt-sync
    app.kubernetes.io/managed-by: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spire-dolt-sync
subjects:
  - kind: ServiceAccount
    name: spire-dolt-sync
    namespace: {{ .Values.namespace }}
{{- end }}
{{- if .Values.backup.enabled }}
---
# RBAC for dolt-backup CronJob — needs pods/exec to run
# `dolt backup sync` inside the dolt pod (same pattern as dolt-sync).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spire-dolt-backup
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-dolt-backup
    app.kubernetes.io/managed-by: {{ .Release.Service }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spire-dolt-backup
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-dolt-backup
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
  # Need to find the dolt pod
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Need to kubectl exec into it
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spire-dolt-backup
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-dolt-backup
    app.kubernetes.io/managed-by: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spire-dolt-backup
subjects:
  - kind: ServiceAccount
    name: spire-dolt-backup
    namespace: {{ .Values.namespace }}
{{- end }}
