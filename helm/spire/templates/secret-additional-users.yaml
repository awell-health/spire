{{- if eq (include "spire.additionalUsersHasInline" .) "true" }}
# Chart-managed Secret that materializes inline `password:` values from
# dolt.additionalUsers entries. Rendered only when at least one entry
# uses the inline form — entries with `passwordSecret.name` reference
# operator-managed Secrets and do NOT land here. Keys are
# `addl-pw-<name>`; the additional-users provisioning Job reads them
# via `valueFrom.secretKeyRef`, so plaintext passwords never appear in
# the Job manifest or in `kubectl describe job` output.
#
# Lifecycle: this Secret is tied to the release and updates on every
# `helm upgrade`, so rotating an inline password is
# `helm upgrade --set dolt.additionalUsers[i].password=<new>` + the Job
# re-runs `ALTER USER` on the next pass.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "spire.additionalUsersSecretName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-dolt-additional-users
    app.kubernetes.io/component: additional-users
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  {{- range $i, $user := .Values.dolt.additionalUsers }}
  {{- if and (not (and $user.passwordSecret $user.passwordSecret.name)) $user.password }}
  addl-pw-{{ $user.name }}: {{ $user.password | quote }}
  {{- end }}
  {{- end }}
{{- end }}
