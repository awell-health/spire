{{- if and .Values.backup.enabled .Values.backup.gcs.serviceAccountJson }}
# GCS service-account credentials used by `dolt backup sync` running
# inside the dolt pod. The JSON is mounted at /creds/gcs/key.json and
# referenced via GOOGLE_APPLICATION_CREDENTIALS on the dolt container.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-gcs-creds
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  key.json: {{ .Values.backup.gcs.serviceAccountJson | b64enc | quote }}
{{- end }}
