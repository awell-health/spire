{{- /*
Shared GCP service-account credential Secret.

Rendered whenever `.Values.gcp.serviceAccountJson` is set (typically
via `--set-file gcp.serviceAccountJson=<path>` at install time).
Mounted by every feature in the chart that talks to Google Cloud
services — currently:

  - dolt backup sync (gated on backup.enabled=true)
  - BundleStore GCS backend (gated on bundleStore.backend=gcs)

Operators who manage the Secret out-of-band (ExternalSecrets, SOPS,
etc.) should set `.Values.gcp.secretName` to the externally-managed
Secret name and leave `serviceAccountJson` empty — the chart will
skip rendering and features will reference the provided name instead.

Filename note: the on-disk template file is still `secret-gcs.yaml`
(legacy from when this only served the backup GCS feature). The
rendered Secret name and content are now GCP-generic.
*/ -}}
{{- if .Values.gcp.serviceAccountJson }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.gcp.secretName | default (printf "%s-gcp-sa" .Release.Name) }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  {{ .Values.gcp.keyName }}: {{ .Values.gcp.serviceAccountJson | b64enc | quote }}
{{- end }}
