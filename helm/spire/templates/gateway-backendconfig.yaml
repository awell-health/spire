{{- if and .Values.gateway.ingress.enabled .Values.gateway.ingress.backendConfig.enabled -}}
# GKE BackendConfig attached to the gateway Service via the
# cloud.google.com/backend-config annotation (see gateway.yaml). Tells
# the GCLB how to health-check the gateway and — when
# backendConfig.http2 is true — to speak HTTP/2 to the backend. The
# metadata.name MUST match the gateway Service name exactly; the Service
# annotation references this resource by name.
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: spire-gateway
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-gateway
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  healthCheck:
    type: HTTP
    requestPath: {{ .Values.gateway.ingress.backendConfig.healthCheckPath | default "/healthz" | quote }}
    port: {{ .Values.gateway.apiPort }}
{{- end }}
