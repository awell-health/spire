{{- if and .Values.gateway.ingress.enabled .Values.gateway.ingress.backendConfig.enabled -}}
# GKE BackendConfig attached to the gateway Service via the
# cloud.google.com/backend-config annotation (see gateway.yaml). Tells
# the GCLB how to health-check the gateway and — when
# backendConfig.http2 is true — to speak HTTP/2 to the backend.
#
# metadata.name is hardcoded to "spire-gateway" to match gateway.yaml's
# Service and gateway-ingress.yaml's backend reference verbatim. The
# Service annotation wires this resource in by name, so any drift
# breaks GCLB wiring regardless of release name. If gateway.yaml
# migrates to `spire.fullname`-based naming, update this line and the
# Service annotation in lockstep.
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: spire-gateway
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-gateway
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  healthCheck:
    type: HTTP
    requestPath: {{ .Values.gateway.ingress.backendConfig.healthCheckPath | default "/healthz" | quote }}
    port: {{ .Values.gateway.apiPort }}
{{- end }}
