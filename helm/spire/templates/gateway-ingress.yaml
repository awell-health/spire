{{- if .Values.gateway.ingress.enabled }}
{{- $fullname := include "spire.fullname" . -}}
{{- $ingress := .Values.gateway.ingress -}}
{{/*
  $serviceName is hardcoded to match gateway.yaml and
  gateway-backendconfig.yaml, which also hardcode "spire-gateway". A
  release installed as `helm install myrelease ...` must still produce
  an Ingress whose backend resolves to the Service — so the name here
  MUST match the Service's metadata.name verbatim. When gateway.yaml
  migrates to `spire.fullname`-based naming, update this line in lockstep.
*/}}
{{- $serviceName := "spire-gateway" -}}
{{- $host := required "gateway.ingress.host is required when ingress.enabled=true" $ingress.host -}}
# HTTPS Ingress fronting the gateway Service. Gated by
# `.Values.gateway.ingress.enabled` and off by default, so local/minikube
# installs (ClusterIP gateway + port-forward) keep working unchanged.
#
# Two TLS strategies are supported and are mutually exclusive:
#
#   A. managedCert.enabled — GKE Ingress + Google-managed cert. The
#      `networking.gke.io/managed-certificates` annotation is emitted
#      here; the matching ManagedCertificate resource lives in
#      gateway-managedcert.yaml. spec.tls is deliberately NOT emitted
#      because GKE wires managed certs via annotation, not tls blocks.
#
#   B. tls.enabled — cert-manager (or any pre-created TLS Secret). The
#      spec.tls block is emitted with the user's secretName; cert-manager
#      itself is wired via `.Values.gateway.ingress.annotations`
#      (e.g. cert-manager.io/cluster-issuer=letsencrypt-prod).
#
# Only /api/v1 (Prefix) and /healthz (Exact) are routed here. /sync
# (Linear/GitHub webhook receiver) stays on its own port and is not
# routed by this Ingress in v1 — do not add a /sync rule without also
# revisiting how webhooks authenticate.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $serviceName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "spire.labels" . | nindent 4 }}
  {{- if or $ingress.managedCert.enabled $ingress.className $ingress.annotations }}
  annotations:
    {{- if $ingress.managedCert.enabled }}
    networking.gke.io/managed-certificates: {{ $ingress.managedCert.name | default (printf "%s-gateway-cert" $fullname) | quote }}
    {{- end }}
    {{- with $ingress.className }}
    # Legacy ingress-class annotation alongside spec.ingressClassName.
    # Required by GKE Autopilot's GLBC: Autopilot does not pre-populate an
    # IngressClass CR for the legacy `gce` name, so without this annotation
    # the controller silently ignores the resource (no events, no LB, no
    # NEGs). Harmless on classic GKE / nginx / traefik — controllers that
    # use IngressClass CRs ignore the annotation when it doesn't match.
    kubernetes.io/ingress.class: {{ . | quote }}
    {{- end }}
    {{- with $ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  {{- with $ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if $ingress.defaultBackend.enabled }}
  # Explicit defaultBackend pointing at the gateway Service. Required on
  # fresh GKE Autopilot clusters: GLBC fails to sync when the cluster's
  # `kube-system/default-http-backend` NEG is missing (Autopilot does not
  # create one), and an Ingress without a defaultBackend never produces
  # forwarding rules. Pointing the default backend at the gateway makes
  # the Ingress self-contained on every cluster.
  defaultBackend:
    service:
      name: {{ $serviceName }}
      port:
        name: api
  {{- end }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: {{ $serviceName }}
                port:
                  name: api
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: {{ $serviceName }}
                port:
                  name: api
  {{- if and $ingress.tls.enabled (not $ingress.managedCert.enabled) }}
  tls:
    - hosts:
        - {{ $host | quote }}
      secretName: {{ $ingress.tls.secretName | quote }}
  {{- end }}
{{- end }}
