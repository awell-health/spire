apiVersion: apps/v1
kind: Deployment
metadata:
  name: spire-operator
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-operator
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spire-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spire-operator
    spec:
      serviceAccountName: spire-operator
      initContainers:
        # Same tower-attach pattern as the steward so the operator has
        # a .beads/ workspace pointed at the cluster dolt. Required by
        # WorkloadAssigner.getSchedulableSet — without it the operator
        # logs "store not initialized — call Ensure() first" every cycle.
        - name: tower-attach
          image: {{ .Values.images.steward.repository }}:{{ .Values.images.steward.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.images.steward.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              set -e
              mkdir -p {{ include "spire.dbDataDir" . }}
              spire tower attach-cluster \
                --data-dir={{ include "spire.dbDataDir" . }} \
                --database="$BEADS_DATABASE" \
                --prefix="$BEADS_PREFIX" \
                --dolthub-remote="$DOLTHUB_REMOTE" \
                --dolt-wait=300s
              chmod 700 {{ include "spire.beadsDir" . }} 2>/dev/null || true
          env:
            - name: DOLT_HOST
              value: "spire-dolt.{{ .Values.namespace }}.svc"
            - name: DOLT_PORT
              value: {{ .Values.dolt.port | quote }}
            - name: BEADS_DOLT_SERVER_HOST
              value: "spire-dolt.{{ .Values.namespace }}.svc"
            - name: BEADS_DOLT_SERVER_PORT
              value: {{ .Values.dolt.port | quote }}
            - name: BEADS_DATABASE
              value: {{ include "spire.database" . | quote }}
            - name: BEADS_PREFIX
              value: {{ .Values.beads.prefix | quote }}
            - name: DOLTHUB_REMOTE
              value: {{ .Values.dolthub.remoteUrl | quote }}
            - name: SPIRE_CONFIG_DIR
              value: {{ include "spire.configDir" . | quote }}
            - name: DOLT_DATA_DIR
              value: {{ .Values.paths.dataRoot | quote }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.paths.dataRoot }}
      containers:
        - name: operator
          image: {{ .Values.images.steward.repository }}:{{ .Values.images.steward.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.images.steward.pullPolicy }}
          command: ["spire-operator"]
          args:
            - --namespace={{ .Values.namespace }}
            - --interval={{ .Values.operator.interval }}
            - --steward-image={{ .Values.images.agent.repository }}:{{ .Values.images.agent.tag | default .Chart.AppVersion }}
            - --beads-dir={{ include "spire.beadsDir" . }}
          env:
            - name: DOLT_HOST
              value: "spire-dolt.{{ .Values.namespace }}.svc"
            - name: DOLT_PORT
              value: {{ .Values.dolt.port | quote }}
            - name: BEADS_DOLT_SERVER_HOST
              value: "spire-dolt.{{ .Values.namespace }}.svc"
            - name: BEADS_DOLT_SERVER_PORT
              value: {{ .Values.dolt.port | quote }}
            - name: SPIRE_CONFIG_DIR
              value: {{ include "spire.configDir" . | quote }}
            - name: DOLT_DATA_DIR
              value: {{ .Values.paths.dataRoot | quote }}
            # BEADS_DATABASE / BEADS_PREFIX / DOLTHUB_REMOTE are propagated to
            # workload wizard pods via the canonical tower-attach init
            # container; the operator's AgentMonitor reads them off its own
            # env (see operator/controllers/agent_monitor.go:buildWorkloadPod).
            - name: BEADS_DATABASE
              value: {{ include "spire.database" . | quote }}
            - name: BEADS_PREFIX
              value: {{ .Values.beads.prefix | quote }}
            - name: DOLTHUB_REMOTE
              value: {{ .Values.dolthub.remoteUrl | quote }}
            # Secret the IntentWorkloadReconciler stamps onto every
            # apprentice PodSpec it builds (operator/main.go reads this
            # and populates IntentWorkloadReconciler.CredentialsSecret).
            # Must match the helm-rendered Secret name so
            # ANTHROPIC_API_KEY_DEFAULT / GITHUB_TOKEN resolve on the
            # pod. Mirrors steward.yaml — same helper, same pattern.
            - name: SPIRE_CREDENTIALS_SECRET
              value: {{ include "spire.secretName" . | quote }}
            {{- include "spire.olapEnv" . | nindent 12 }}
            {{- include "spire.logStoreEnv" . | nindent 12 }}
            {{- if or (eq .Values.bundleStore.backend "gcs") (eq (include "spire.logStoreNeedsGCP" .) "true") }}
            # The SPIRE_GCP_* env tells the operator to stamp the shared
            # gcp-sa Secret + GOOGLE_APPLICATION_CREDENTIALS onto every
            # wizard / apprentice / sage pod it builds, so any
            # GCS-touching feature inside those pods (bundleStore put/get,
            # logartifact substrate writes once spi-k1cnof lands) can
            # authenticate. Either bundleStore=gcs OR logStore=gcs is
            # enough to require the propagation — both features share the
            # same gcp.* credential by spi-hzeyz9 design (no second auth
            # model). Read by main.go and consumed by
            # AgentMonitor.applyOperatorOverlay (wizard pods) and by
            # IntentWorkloadReconciler (apprentice/sage/cleric pods built
            # through agent.BuildApprenticePod / BuildWizardPod /
            # BuildSagePod / BuildClericPod).
            - name: SPIRE_GCP_SECRET_NAME
              value: {{ include "spire.gcpSecretName" . | quote }}
            - name: SPIRE_GCP_MOUNT_PATH
              value: {{ .Values.gcp.mountPath | quote }}
            - name: SPIRE_GCP_KEY_NAME
              value: {{ .Values.gcp.keyName | quote }}
            {{- end }}
            {{- if eq (include "spire.logStoreNeedsGCP" .) "true" }}
            # ADC for the operator's own GCS interactions. The operator
            # itself does not write log artifacts today, but stamping
            # the env here matches the steward/gateway pattern so any
            # future GCS-aware reconciler sees the same auth shape
            # without a chart change.
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: {{ .Values.gcp.mountPath }}/{{ .Values.gcp.keyName }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.paths.dataRoot }}
            {{- if eq (include "spire.logStoreNeedsGCP" .) "true" }}
            - name: gcp-sa
              mountPath: {{ .Values.gcp.mountPath }}
              readOnly: true
            {{- end }}
          resources:
            requests:
              cpu: {{ .Values.operator.resources.requests.cpu }}
              memory: {{ .Values.operator.resources.requests.memory }}
            limits:
              cpu: {{ .Values.operator.resources.limits.cpu }}
              memory: {{ .Values.operator.resources.limits.memory }}
      volumes:
        - name: data
          emptyDir: {}
        {{- if eq (include "spire.logStoreNeedsGCP" .) "true" }}
        - name: gcp-sa
          secret:
            secretName: {{ include "spire.gcpSecretName" . }}
            defaultMode: 0400
        {{- end }}
