{{- if .Values.gcp.serviceAccountJson }}
# Shared GCP service-account credential. Consumed by every
# GCP-dependent feature in the chart:
#   - dolt backup sync (helm/spire/templates/dolt.yaml, gated on
#     .Values.backup.enabled)
#   - BundleStore GCS backend (helm/spire/templates/steward.yaml,
#     gated on .Values.bundleStore.backend == "gcs")
# Render gate is .Values.gcp.serviceAccountJson — consumers then gate
# on their own feature toggles, which means the Secret is created
# exactly once even when both features are enabled.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "spire.gcpSecretName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
data:
  {{ .Values.gcp.keyName }}: {{ .Values.gcp.serviceAccountJson | b64enc | quote }}
{{- end }}
