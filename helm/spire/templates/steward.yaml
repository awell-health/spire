{{- if eq .Values.bundleStore.backend "gcs" -}}
{{- $_ := required "gcp.serviceAccountJson is required when bundleStore.backend=gcs — pass with --set-file gcp.serviceAccountJson=<path>" .Values.gcp.serviceAccountJson -}}
{{- $_ = required "bundleStore.gcs.bucket is required when bundleStore.backend=gcs" .Values.bundleStore.gcs.bucket -}}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spire-steward
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-steward
    app.kubernetes.io/part-of: spire
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spire-steward
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spire-steward
    spec:
      serviceAccountName: spire-operator
      initContainers:
        # Non-interactive tower attach: waits for the cloned DB to be served
        # by the dolt pod, reads project_id and prefix from its metadata
        # table, and writes an authoritative .beads/ workspace to /data.
        # Replaces the older static beads-seed ConfigMap approach — shares
        # logic with `spire tower attach` via pkg/tower so CLI and cluster
        # paths stay aligned.
        - name: tower-attach
          image: {{ .Values.images.steward.repository }}:{{ .Values.images.steward.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.images.steward.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              set -e
              if [ ! -d {{ .Values.paths.dataRoot }}/.git ]; then
                cd {{ .Values.paths.dataRoot }} && git init -q 2>/dev/null || true
                git config user.name "spire-steward"
                git config user.email "steward@spire.local"
              fi
              mkdir -p {{ include "spire.dbDataDir" . }}
              spire tower attach-cluster \
                --data-dir={{ include "spire.dbDataDir" . }} \
                --database="$BEADS_DATABASE" \
                --prefix="$BEADS_PREFIX" \
                --dolthub-remote="$DOLTHUB_REMOTE" \
                --bundle-store-backend={{ .Values.bundleStore.backend | quote }} \
                --bundle-store-gcs-bucket={{ .Values.bundleStore.gcs.bucket | quote }} \
                --bundle-store-gcs-prefix={{ .Values.bundleStore.gcs.prefix | quote }} \
                --bootstrap-if-blank \
                --dolt-wait=300s
              # bd warns at 0755 — tighten. Done after attach-cluster so
              # the directory exists.
              chmod 700 {{ include "spire.beadsDir" . }} 2>/dev/null || true
          env:
            # DOLT_HOST/DOLT_PORT are what pkg/dolt reads (attach-cluster's
            # own SQL probes). BEADS_DOLT_SERVER_HOST/PORT are what the bd
            # subprocess reads — without them bd defaults to 127.0.0.1,
            # which breaks the ensureCustomBeadTypes step. Set both.
            - name: DOLT_HOST
              value: "spire-dolt.{{ .Values.namespace }}.svc"
            - name: DOLT_PORT
              value: {{ .Values.dolt.port | quote }}
            - name: BEADS_DOLT_SERVER_HOST
              value: "spire-dolt.{{ .Values.namespace }}.svc"
            - name: BEADS_DOLT_SERVER_PORT
              value: {{ .Values.dolt.port | quote }}
            - name: BEADS_DATABASE
              value: {{ include "spire.database" . | quote }}
            - name: BEADS_PREFIX
              value: {{ .Values.beads.prefix | quote }}
            - name: DOLTHUB_REMOTE
              value: {{ .Values.dolthub.remoteUrl | quote }}
            # Persist the tower config on the shared PVC (init → main
            # container). Paired with DOLT_DATA_DIR so BeadsDirForTower
            # resolves via the laptop convention instead of needing a
            # persisted override on TowerConfig.
            - name: SPIRE_CONFIG_DIR
              value: {{ include "spire.configDir" . | quote }}
            - name: DOLT_DATA_DIR
              value: {{ .Values.paths.dataRoot | quote }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.paths.dataRoot }}
      containers:
        - name: steward
          image: {{ .Values.images.steward.repository }}:{{ .Values.images.steward.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.images.steward.pullPolicy }}
          env:
            # Shared with the sidecar container — see spire.stewardCommonEnv
            # in _helpers.tpl. Main-only entries (STEWARD_*, SPIRE_AGENT_IMAGE,
            # SPIRE_CREDENTIALS_SECRET, and the gcs-gated
            # GOOGLE_APPLICATION_CREDENTIALS) are layered on after the
            # include so they never leak into the sidecar.
            {{- include "spire.stewardCommonEnv" . | nindent 12 }}
            - name: STEWARD_INTERVAL
              value: {{ .Values.steward.interval | quote }}
            - name: STEWARD_BACKEND
              value: {{ .Values.steward.backend | quote }}
            - name: STEWARD_METRICS_PORT
              value: {{ .Values.steward.metricsPort | quote }}
            # Required for STEWARD_BACKEND=k8s — the agent pod image the
            # operator spawns when a wizard is needed.
            - name: SPIRE_AGENT_IMAGE
              value: "{{ .Values.images.agent.repository }}:{{ .Values.images.agent.tag }}"
            # Secret the k8s backend references when projecting credentials
            # onto wizard pods. Must match the helm-rendered Secret name so
            # ANTHROPIC_API_KEY_DEFAULT / GITHUB_TOKEN resolve.
            - name: SPIRE_CREDENTIALS_SECRET
              value: {{ include "spire.secretName" . | quote }}
            {{- if eq .Values.bundleStore.backend "gcs" }}
            # ADC path for the GCS BundleStore client. The gcs backend
            # picks this up via google.golang.org/api/option.WithCredentialsFile
            # when the ClusterCred resolver returns the Secret-mounted
            # file — same env var the minikube smoke path documents in
            # pkg/bundlestore/README.md.
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: {{ .Values.gcp.mountPath }}/{{ .Values.gcp.keyName }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.steward.metricsPort }}
              protocol: TCP
          resources:
            requests:
              cpu: {{ .Values.steward.resources.requests.cpu }}
              memory: {{ .Values.steward.resources.requests.memory }}
            limits:
              cpu: {{ .Values.steward.resources.limits.cpu }}
              memory: {{ .Values.steward.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /livez
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: {{ .Values.paths.dataRoot }}
            - name: spire-config
              mountPath: /etc/spire
              readOnly: true
            {{- if eq .Values.bundleStore.backend "gcs" }}
            - name: gcp-sa
              mountPath: {{ .Values.gcp.mountPath }}
              readOnly: true
            {{- end }}
          workingDir: /etc/spire
        - name: sidecar
          image: {{ .Values.images.steward.repository }}:{{ .Values.images.steward.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.images.steward.pullPolicy }}
          command: ["spire-steward-sidecar"]
          args:
            - "--comms-dir=/comms"
            - "--poll-interval={{ .Values.steward.sidecarPollInterval }}"
            - "--model={{ .Values.steward.sidecarModel }}"
            - "--context-threshold=0.45"
            - "--port=8081"
          env:
            # Shared with the main steward container — see
            # spire.stewardCommonEnv in _helpers.tpl. The sidecar's
            # runtime needs BEADS_DIR / DOLT_DATA_DIR / SPIRE_CONFIG_DIR /
            # BEADS_PREFIX to resolve the tower via config.ActiveTower()
            # and BeadsDirForTower(); without them it falls back to
            # /data/.beads and reports "no tower configured".
            {{- include "spire.stewardCommonEnv" . | nindent 12 }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "spire.secretName" . }}
                  key: ANTHROPIC_API_KEY_DEFAULT
                  optional: true
          resources:
            requests:
              cpu: {{ .Values.steward.resources.requests.cpu }}
              memory: {{ .Values.steward.resources.requests.memory }}
            limits:
              cpu: {{ .Values.steward.resources.limits.cpu }}
              memory: 512Mi
          workingDir: {{ .Values.paths.dataRoot }}
          volumeMounts:
            - name: comms
              mountPath: /comms
            - name: data
              mountPath: {{ .Values.paths.dataRoot }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: spire-steward-data
        - name: comms
          emptyDir: {}
        - name: spire-config
          configMap:
            name: spire-config
        {{- if eq .Values.bundleStore.backend "gcs" }}
        - name: gcp-sa
          secret:
            secretName: {{ include "spire.gcpSecretName" . }}
            defaultMode: 0400
        {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-config
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data: {}
