apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: spire-steward-data
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-steward
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.stewardStorage.size }}
  {{- if .Values.stewardStorage.storageClass }}
  storageClassName: {{ .Values.stewardStorage.storageClass }}
  {{- end }}
