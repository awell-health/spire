{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "spire.secretName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  DOLT_REMOTE_USER: {{ .Values.dolthub.user | quote }}
  DOLT_REMOTE_PASSWORD: {{ .Values.dolthub.password | quote }}
  {{- /*
    ANTHROPIC_API_KEY_DEFAULT is what callers sending x-api-key: ... read
    (including the steward-sidecar's hand-rolled HTTP client, which the
    Anthropic API rejects with 401 when given an OAuth token). Prefer
    apiKey if set; fall back to oauthToken only when no API key exists,
    on the chance a caller wires OAuth-compatible auth downstream.
    Separately, CLAUDE_CODE_OAUTH_TOKEN is set when oauthToken is
    provided so the `claude` CLI on agent pods can use Max/Team OAuth.
  */}}
  ANTHROPIC_API_KEY_DEFAULT: {{ .Values.anthropic.apiKey | default .Values.anthropic.oauthToken | quote }}
  {{- if .Values.anthropic.oauthToken }}
  CLAUDE_CODE_OAUTH_TOKEN: {{ .Values.anthropic.oauthToken | quote }}
  {{- end }}
  {{- if .Values.openai.apiKey }}
  OPENAI_API_KEY: {{ .Values.openai.apiKey | quote }}
  {{- end }}
  {{- if .Values.github.token }}
  GITHUB_TOKEN: {{ .Values.github.token | quote }}
  {{- end }}
  {{- if .Values.linear.apiKey }}
  LINEAR_API_KEY: {{ .Values.linear.apiKey | quote }}
  {{- end }}
  {{- if .Values.credentials.codex.apiKey }}
  CODEX_API_KEY: {{ .Values.credentials.codex.apiKey | quote }}
  {{- end }}
  {{- if .Values.credentials.oauth.linear.clientId }}
  LINEAR_OAUTH_CLIENT_ID: {{ .Values.credentials.oauth.linear.clientId | quote }}
  {{- end }}
  {{- if .Values.credentials.oauth.linear.clientSecret }}
  LINEAR_OAUTH_CLIENT_SECRET: {{ .Values.credentials.oauth.linear.clientSecret | quote }}
  {{- end }}
{{- end }}
