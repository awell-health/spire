apiVersion: v1
kind: Secret
metadata:
  name: spire-credentials
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  DOLT_REMOTE_USER: {{ .Values.dolthub.user | quote }}
  DOLT_REMOTE_PASSWORD: {{ .Values.dolthub.password | quote }}
  ANTHROPIC_API_KEY_DEFAULT: {{ .Values.anthropic.apiKey | quote }}
  {{- if .Values.github.token }}
  GITHUB_TOKEN: {{ .Values.github.token | quote }}
  {{- end }}
  {{- if .Values.linear.apiKey }}
  LINEAR_API_KEY: {{ .Values.linear.apiKey | quote }}
  {{- end }}
