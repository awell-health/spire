{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: spire-credentials
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
type: Opaque
stringData:
  DOLT_REMOTE_USER: {{ .Values.dolthub.user | quote }}
  DOLT_REMOTE_PASSWORD: {{ .Values.dolthub.password | quote }}
  {{- /*
    ANTHROPIC_API_KEY_DEFAULT is what the operator injects as ANTHROPIC_API_KEY
    into agent pods. Prefer oauthToken if set (Max/Team subscription), else apiKey.
    The claude CLI accepts OAuth tokens in this env var.
  */}}
  ANTHROPIC_API_KEY_DEFAULT: {{ .Values.anthropic.oauthToken | default .Values.anthropic.apiKey | quote }}
  {{- if .Values.anthropic.oauthToken }}
  CLAUDE_CODE_OAUTH_TOKEN: {{ .Values.anthropic.oauthToken | quote }}
  {{- end }}
  {{- if .Values.openai.apiKey }}
  OPENAI_API_KEY: {{ .Values.openai.apiKey | quote }}
  {{- end }}
  {{- if .Values.github.token }}
  GITHUB_TOKEN: {{ .Values.github.token | quote }}
  {{- end }}
  {{- if .Values.linear.apiKey }}
  LINEAR_API_KEY: {{ .Values.linear.apiKey | quote }}
  {{- end }}
{{- end }}
