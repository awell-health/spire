apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: spire-dolt
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-dolt
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  serviceName: spire-dolt
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: spire-dolt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spire-dolt
    spec:
      initContainers:
        - name: dolt-init
          image: {{ .Values.images.dolt.repository }}:{{ .Values.images.dolt.tag }}
          command: ["bash", "/scripts/init.sh"]
          env:
            - name: DOLT_ROOT_PATH
              value: /var/lib/dolt
            - name: DOLT_REMOTE_USER
              valueFrom:
                secretKeyRef:
                  name: spire-credentials
                  key: DOLT_REMOTE_USER
            - name: DOLT_REMOTE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spire-credentials
                  key: DOLT_REMOTE_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/dolt
            - name: init-scripts
              mountPath: /scripts
      containers:
        - name: dolt
          image: {{ .Values.images.dolt.repository }}:{{ .Values.images.dolt.tag }}
          imagePullPolicy: {{ .Values.images.dolt.pullPolicy }}
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: DOLT_ROOT_PATH
              value: /var/lib/dolt
            - name: DOLT_ROOT_HOST
              value: "%"
            - name: DOLT_REMOTE_USER
              valueFrom:
                secretKeyRef:
                  name: spire-credentials
                  key: DOLT_REMOTE_USER
            - name: DOLT_REMOTE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spire-credentials
                  key: DOLT_REMOTE_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/dolt
            - name: dolt-config
              mountPath: /var/lib/dolt/config.yaml
              subPath: config.yaml
          resources:
            requests:
              cpu: {{ .Values.dolt.resources.requests.cpu }}
              memory: {{ .Values.dolt.resources.requests.memory }}
            limits:
              cpu: {{ .Values.dolt.resources.limits.cpu }}
              memory: {{ .Values.dolt.resources.limits.memory }}
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: dolt-config
          configMap:
            name: dolt-server-config
        - name: init-scripts
          configMap:
            name: dolt-init
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: spire-dolt
          app.kubernetes.io/component: beads-storage
          app.kubernetes.io/managed-by: {{ .Release.Service }}
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.dolt.storage.size }}
        {{- if .Values.dolt.storage.storageClass }}
        storageClassName: {{ .Values.dolt.storage.storageClass }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: spire-dolt
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-dolt
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  selector:
    app.kubernetes.io/name: spire-dolt
  ports:
    - port: 3306
      targetPort: 3306
      name: mysql
  clusterIP: None
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dolt-server-config
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  config.yaml: |
    log_level: info
    behavior:
      read_only: false
      autocommit: true
    user:
      name: root
      password: ""
    allow_cleartext_passwords: true
    listener:
      host: "0.0.0.0"
      port: 3306
      max_connections: 100
      read_timeout_millis: 28800000
      write_timeout_millis: 28800000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dolt-init
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  init.sh: |
    #!/bin/bash
    set -e
    DB_DIR="/var/lib/dolt/{{ .Values.beads.database | default .Values.beads.prefix }}"

    dolt config --global --set user.name "spire-dolt"
    dolt config --global --set user.email "dolt@spire.local"

    if [ ! -d "$DB_DIR/.dolt" ]; then
      echo "[dolt-init] first boot — cloning from DoltHub..."
      cd /var/lib/dolt
      dolt clone "https://doltremoteapi.dolthub.com/{{ .Values.dolthub.remote }}" {{ .Values.beads.database | default .Values.beads.prefix }} 2>&1 \
        || {
          echo "[dolt-init] WARNING: clone failed — initializing empty database"
          mkdir -p {{ .Values.beads.database | default .Values.beads.prefix }} && cd {{ .Values.beads.database | default .Values.beads.prefix }} && dolt init
          dolt remote add origin "https://doltremoteapi.dolthub.com/{{ .Values.dolthub.remote }}"
        }
    else
      echo "[dolt-init] PV has data — ensuring remote is configured"
      cd "$DB_DIR"
      # Ensure origin remote exists (idempotent)
      dolt remote remove origin 2>/dev/null || true
      dolt remote add origin "https://doltremoteapi.dolthub.com/{{ .Values.dolthub.remote }}"
    fi
    echo "[dolt-init] done"
