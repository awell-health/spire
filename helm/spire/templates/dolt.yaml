apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: spire-dolt
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-dolt
    app.kubernetes.io/component: database
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  serviceName: spire-dolt
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: spire-dolt
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spire-dolt
    spec:
      initContainers:
        - name: dolt-init
          image: {{ .Values.images.dolt.repository }}:{{ .Values.images.dolt.tag }}
          command: ["bash", "/scripts/init.sh"]
          env:
            - name: DOLT_ROOT_PATH
              value: /var/lib/dolt
            - name: DOLT_REMOTE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "spire.secretName" . }}
                  key: DOLT_REMOTE_USER
            - name: DOLT_REMOTE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "spire.secretName" . }}
                  key: DOLT_REMOTE_PASSWORD
            {{- if .Values.dolthub.credsKeyId }}
            - name: DOLT_CREDS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-dolthub-creds
                  key: key-id
            - name: DOLTHUB_USER
              value: {{ .Values.dolthub.userName | default "awell" | quote }}
            - name: DOLTHUB_EMAIL
              value: {{ .Values.dolthub.userEmail | default "dolt@spire.local" | quote }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/dolt
            - name: init-scripts
              mountPath: /scripts
            {{- if .Values.dolthub.credsKeyId }}
            # Read-only source directory — the init script copies the JWK
            # from here into $DOLT_ROOT_PATH/.dolt/creds/ where dolt can
            # write to it (dolt creds import wants a writable target).
            - name: dolthub-creds
              mountPath: /creds-input
              readOnly: true
            {{- end }}
      containers:
        - name: dolt
          image: {{ .Values.images.dolt.repository }}:{{ .Values.images.dolt.tag }}
          imagePullPolicy: {{ .Values.images.dolt.pullPolicy }}
          # Override the image's default entrypoint so the server reads
          # our config.yaml (with the remotesapi block). The stock
          # dolthub/dolt-sql-server entrypoint runs `dolt sql-server
          # --host=0.0.0.0 --port=3306` with no --config flag and
          # silently ignores any mounted config file — exactly the
          # behavior we hit when remotesapi wasn't coming up.
          command: ["dolt"]
          args:
            - sql-server
            - --config=/var/lib/dolt/config.yaml
          ports:
            - containerPort: {{ .Values.dolt.port }}
              name: mysql
            - containerPort: {{ .Values.dolt.remotesapiPort }}
              name: remotesapi
          env:
            - name: DOLT_ROOT_PATH
              value: /var/lib/dolt
            - name: DOLT_ROOT_HOST
              value: "%"
            - name: DOLT_REMOTE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "spire.secretName" . }}
                  key: DOLT_REMOTE_USER
            - name: DOLT_REMOTE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "spire.secretName" . }}
                  key: DOLT_REMOTE_PASSWORD
            {{- if .Values.dolthub.credsKeyId }}
            - name: DOLT_CREDS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-dolthub-creds
                  key: key-id
            {{- end }}
            {{- if and .Values.backup.enabled .Values.gcp.serviceAccountJson }}
            # Points dolt's GCS client at the mounted service-account
            # JSON so `dolt backup sync <gcs-remote>` can authenticate.
            # The SA file and path come from the shared gcp.* top-level
            # values — same Secret is consumed by BundleStore's steward
            # path.
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: {{ .Values.gcp.mountPath }}/{{ .Values.gcp.keyName }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/dolt
            - name: dolt-config
              mountPath: /var/lib/dolt/config.yaml
              subPath: config.yaml
            {{- if .Values.dolthub.credsKeyId }}
            # Read-only source dir. Main server reads the creds the
            # init container copied into $DOLT_ROOT_PATH/.dolt/creds
            # and registered via `dolt creds import`.
            - name: dolthub-creds
              mountPath: /creds-input
              readOnly: true
            {{- end }}
            {{- if and .Values.backup.enabled .Values.gcp.serviceAccountJson }}
            - name: gcp-sa
              mountPath: {{ .Values.gcp.mountPath }}
              readOnly: true
            {{- end }}
          resources:
            requests:
              cpu: {{ .Values.dolt.resources.requests.cpu }}
              memory: {{ .Values.dolt.resources.requests.memory }}
            limits:
              cpu: {{ .Values.dolt.resources.limits.cpu }}
              memory: {{ .Values.dolt.resources.limits.memory }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.dolt.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.dolt.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: dolt-config
          configMap:
            name: dolt-server-config
        - name: init-scripts
          configMap:
            name: dolt-init
            defaultMode: 0755
        {{- if .Values.dolthub.credsKeyId }}
        - name: dolthub-creds
          secret:
            secretName: {{ .Release.Name }}-dolthub-creds
            defaultMode: 0400
            items:
              - key: key-value
                path: key-value
        {{- end }}
        {{- if and .Values.backup.enabled .Values.gcp.serviceAccountJson }}
        - name: gcp-sa
          secret:
            secretName: {{ include "spire.gcpSecretName" . }}
            defaultMode: 0400
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: spire-dolt
          app.kubernetes.io/component: beads-storage
          app.kubernetes.io/managed-by: {{ .Release.Service }}
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.dolt.storage.size }}
        {{- if .Values.dolt.storage.storageClass }}
        storageClassName: {{ .Values.dolt.storage.storageClass }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: spire-dolt
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-dolt
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  selector:
    app.kubernetes.io/name: spire-dolt
  ports:
    - port: {{ .Values.dolt.port }}
      targetPort: {{ .Values.dolt.port }}
      name: mysql
    - port: {{ .Values.dolt.remotesapiPort }}
      targetPort: {{ .Values.dolt.remotesapiPort }}
      name: remotesapi
  clusterIP: None
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dolt-server-config
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  config.yaml: |
    log_level: info
    behavior:
      read_only: false
      autocommit: true
    user:
      name: root
      password: ""
    listener:
      host: "0.0.0.0"
      port: {{ .Values.dolt.port }}
      max_connections: 100
      read_timeout_millis: 28800000
      write_timeout_millis: 28800000
    # Expose this dolt server as a dolt-remote endpoint on its own port.
    # Clients (laptops, CI, other clusters) can then
    #   dolt remote add cluster http://<host>:{{ .Values.dolt.remotesapiPort }}/<db>
    # and push/pull directly, skipping DoltHub as the sync spine.
    remotesapi:
      port: {{ .Values.dolt.remotesapiPort }}
      read_only: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dolt-init
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
data:
  init.sh: |
    #!/bin/bash
    set -e
    DB_DIR="/var/lib/dolt/{{ .Values.beads.database | default .Values.beads.prefix }}"

    # user.name MUST match the DoltHub account that owns the credential
    # key — DoltHub enforces this for fetch/pull auth (not for clone,
    # which is why clone-only tests don't catch a mismatch). From
    # DoltHub's reference Dockerfile: `user.name` = DOLTHUB_USER env.
    dolt config --global --set user.name "${DOLTHUB_USER:-spire-dolt}"
    dolt config --global --set user.email "${DOLTHUB_EMAIL:-dolt@spire.local}"

    # Full DoltHub auth ritual (mirrors the official awell/awell
    # Dockerfile): copy JWK from the read-only Secret mount into the
    # writable creds dir, then import + use. Just setting `user.creds`
    # config is enough for clone but NOT for pull/fetch/push.
    if [ -n "$DOLT_CREDS_KEY_ID" ] && [ -f "/creds-input/key-value" ]; then
      mkdir -p "$DOLT_ROOT_PATH/.dolt/creds"
      cp "/creds-input/key-value" "$DOLT_ROOT_PATH/.dolt/creds/${DOLT_CREDS_KEY_ID}.jwk"
      chmod 600 "$DOLT_ROOT_PATH/.dolt/creds/${DOLT_CREDS_KEY_ID}.jwk"
      dolt creds import "$DOLT_ROOT_PATH/.dolt/creds/${DOLT_CREDS_KEY_ID}.jwk" || true
      dolt creds use "$DOLT_CREDS_KEY_ID" || true
    fi

    if [ ! -d "$DB_DIR/.dolt" ]; then
      echo "[dolt-init] first boot — cloning from DoltHub..."
      cd /var/lib/dolt
      dolt clone "https://doltremoteapi.dolthub.com/{{ .Values.dolthub.remoteUrl }}" {{ .Values.beads.database | default .Values.beads.prefix }} 2>&1 \
        || {
          echo "[dolt-init] WARNING: clone failed — initializing empty database"
          mkdir -p {{ .Values.beads.database | default .Values.beads.prefix }} && cd {{ .Values.beads.database | default .Values.beads.prefix }} && dolt init
          dolt remote add origin "https://doltremoteapi.dolthub.com/{{ .Values.dolthub.remoteUrl }}"
        }
    else
      echo "[dolt-init] PV has data — ensuring remote is configured"
      cd "$DB_DIR"
      # Ensure origin remote exists (idempotent)
      dolt remote remove origin 2>/dev/null || true
      dolt remote add origin "https://doltremoteapi.dolthub.com/{{ .Values.dolthub.remoteUrl }}"
    fi

    {{- if .Values.backup.enabled }}
    # Register the GCS backup remote (idempotent — `dolt backup add`
    # errors harmlessly if the target already exists, so we swallow it).
    # `dolt backup sync` (run later by the spire-dolt-backup CronJob)
    # resolves this name to the gs:// URL.
    cd "$DB_DIR"
    BACKUP_URL="gs://{{ .Values.backup.gcs.bucket }}/{{ .Values.backup.gcs.prefix }}"
    echo "[dolt-init] registering backup remote {{ .Values.backup.remoteName }} -> $BACKUP_URL"
    dolt backup add {{ .Values.backup.remoteName | quote }} "$BACKUP_URL" \
      || echo "[dolt-init] backup remote already registered (ok)"
    {{- end }}

    echo "[dolt-init] done"
