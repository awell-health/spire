# DEPRECATED: bidirectional cluster<->DoltHub sync recreates the
# non-fast-forward / merge-conflict divergence class observed on
# 2026-04-26 whenever both DoltHub and the cluster write. Disabled by
# default in cluster-as-truth installs (`.Values.syncer.enabled=false`).
# The cluster Dolt database is the write authority; GCS backup
# (`.Values.backup.*`) is the canonical archive/DR path. The runtime
# Sync method is itself a no-op now (pkg/steward/daemon_runner.go::
# clusterStrategy.Sync), so even an opt-in syncer pod will not perform
# DOLT_PULL/DOLT_PUSH against DoltHub on its loop. The template is
# preserved so a deliberate one-shot first-install seed can still set
# `syncer.enabled=true`.
{{- if .Values.syncer.enabled }}
# Syncer: long-running loop that previously bridged the cluster dolt DB
# and DoltHub. Converted from a CronJob to a Deployment because k8s
# CronJob cannot schedule sub-minute intervals.
#
# Requires the same JWK + .beads bootstrap as the dolt pod because
# spire pull/push authenticate to DoltHub via the JWK credential file.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spire-syncer
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-syncer
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spire-syncer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spire-syncer
    spec:
      serviceAccountName: spire-dolt-sync
      initContainers:
        - name: tower-attach
          image: {{ .Values.images.steward.repository }}:{{ .Values.images.steward.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.images.steward.pullPolicy }}
          command: ["sh", "-c"]
          args:
            - |
              set -e
              mkdir -p {{ include "spire.dbDataDir" . }}
              spire tower attach-cluster \
                --data-dir={{ include "spire.dbDataDir" . }} \
                --database="$BEADS_DATABASE" \
                --prefix="$BEADS_PREFIX" \
                --dolthub-remote="$DOLTHUB_REMOTE" \
                --dolt-wait=300s
              chmod 700 {{ include "spire.beadsDir" . }} 2>/dev/null || true
          env:
            - name: DOLT_HOST
              value: "spire-dolt.{{ .Values.namespace }}.svc"
            - name: DOLT_PORT
              value: {{ .Values.dolt.port | quote }}
            - name: BEADS_DOLT_SERVER_HOST
              value: "spire-dolt.{{ .Values.namespace }}.svc"
            - name: BEADS_DOLT_SERVER_PORT
              value: {{ .Values.dolt.port | quote }}
            - name: BEADS_DATABASE
              value: {{ include "spire.database" . | quote }}
            - name: BEADS_PREFIX
              value: {{ .Values.beads.prefix | quote }}
            - name: DOLTHUB_REMOTE
              value: {{ .Values.dolthub.remoteUrl | quote }}
            - name: SPIRE_CONFIG_DIR
              value: {{ include "spire.configDir" . | quote }}
            - name: DOLT_DATA_DIR
              value: {{ .Values.paths.dataRoot | quote }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.paths.dataRoot }}
      containers:
        - name: syncer
          image: {{ .Values.images.steward.repository }}:{{ .Values.images.steward.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.images.steward.pullPolicy }}
          command: ["spire"]
          args:
            - daemon
            # Single-tower cluster mode: sync just this DB via SQL pull/push
            # against the running dolt server (the syncer pod has no local
            # dolt repo — the dolt StatefulSet does, with JWK creds).
            - --database={{ .Values.beads.database | default .Values.beads.prefix }}
            - --interval={{ .Values.syncer.interval }}
            - --debounce={{ .Values.syncer.debounce }}
            # --serve starts pkg/gateway.Server in the same process so POST
            # /sync on :port forwards to this daemon's Trigger().
            - --serve=:{{ .Values.syncer.port }}
          workingDir: {{ .Values.paths.dataRoot }}
          ports:
            - name: http
              containerPort: {{ .Values.syncer.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            # Syncer uses cluster-sql strategy (CALL DOLT_PULL via the
            # dolt server). The DoltHub-facing auth lives on the dolt
            # pod — the syncer only needs to reach the dolt server
            # over MySQL wire protocol. No JWK / DOLT_REMOTE_* here.
            - name: DOLT_HOST
              value: "spire-dolt.{{ .Values.namespace }}.svc"
            - name: DOLT_PORT
              value: {{ .Values.dolt.port | quote }}
            - name: BEADS_DOLT_SERVER_HOST
              value: "spire-dolt.{{ .Values.namespace }}.svc"
            - name: BEADS_DOLT_SERVER_PORT
              value: {{ .Values.dolt.port | quote }}
            - name: SPIRE_CONFIG_DIR
              value: {{ include "spire.configDir" . | quote }}
            - name: DOLT_DATA_DIR
              value: {{ .Values.paths.dataRoot | quote }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.paths.dataRoot }}
      volumes:
        - name: data
          emptyDir: {}
---
# Service exposing the gateway's POST /sync endpoint in-cluster.
# Reachable via `spire-syncer.<ns>.svc:<port>` from other pods. For
# laptop-to-cluster triggers, port-forward or add an Ingress as needed.
apiVersion: v1
kind: Service
metadata:
  name: spire-syncer
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-syncer
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  selector:
    app.kubernetes.io/name: spire-syncer
  ports:
    - name: http
      port: {{ .Values.syncer.port }}
      targetPort: {{ .Values.syncer.port }}
      protocol: TCP
{{- end }}
