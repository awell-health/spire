{{- if .Values.syncer.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: spire-syncer
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: spire-syncer
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  schedule: {{ .Values.syncer.schedule | quote }}
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: spire-dolt-sync
          containers:
            - name: syncer
              image: {{ .Values.images.steward.repository }}:{{ .Values.images.steward.tag | default .Chart.AppVersion }}
              imagePullPolicy: {{ .Values.images.steward.pullPolicy }}
              command: ["sh", "-c"]
              args:
                - "spire pull && spire push"
              env:
                - name: DOLT_HOST
                  value: "spire-dolt.{{ .Values.namespace }}.svc"
                - name: DOLT_PORT
                  value: {{ .Values.dolt.port | quote }}
                - name: DOLT_REMOTE_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "spire.secretName" . }}
                      key: DOLT_REMOTE_USER
                - name: DOLT_REMOTE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "spire.secretName" . }}
                      key: DOLT_REMOTE_PASSWORD
{{- end }}
