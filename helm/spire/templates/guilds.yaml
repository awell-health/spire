{{- range .Values.guilds }}
---
apiVersion: spire.awell.io/v1alpha1
kind: WizardGuild
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
spec:
  mode: {{ .mode | default "managed" }}
  {{- if .image }}
  image: {{ .image }}
  {{- else }}
  image: {{ $.Values.images.agent.repository }}:{{ $.Values.images.agent.tag | default $.Chart.AppVersion }}
  {{- end }}
  repo: {{ .repo | quote }}
  repoBranch: {{ .repoBranch | default "main" | quote }}
  prefixes:
    {{- range .prefixes }}
    - {{ . | quote }}
    {{- end }}
  maxConcurrent: {{ .maxConcurrent | default 1 }}
  {{- if .capabilities }}
  # Reserved field — no-op until wired up. Only rendered when explicitly set.
  capabilities:
    {{- range .capabilities }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  {{- if .resources }}
  resources:
    {{- toYaml .resources | nindent 4 }}
  {{- end }}
  # spec.cache is the canonical cluster-native substrate (spi-gvrfv): the
  # operator provisions a guild-owned cache PVC and every wizard pod
  # mounts it via the cache-bootstrap init container. The old
  # repo-bootstrap origin-clone path is retired, so every managed-mode
  # guild gets a cache block. Per-guild overrides win; chart defaults
  # live under `.Values.cache.*`.
  cache:
    size: {{ (.cache).size | default (include "spire.cacheDefaultSize" $) | quote }}
    accessMode: {{ (.cache).accessMode | default (include "spire.cacheDefaultAccessMode" $) | quote }}
    refreshInterval: {{ (.cache).refreshInterval | default "5m" | quote }}
    {{- $sc := (.cache).storageClassName | default (include "spire.cacheDefaultStorageClassName" $) }}
    {{- if $sc }}
    storageClassName: {{ $sc | quote }}
    {{- end }}
    {{- if (.cache).branchPin }}
    branchPin: {{ (.cache).branchPin | quote }}
    {{- end }}
{{- end }}
