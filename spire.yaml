runtime:
  language: go
  test: go test ./cmd/spire/ -timeout=30s
  build: go build ./cmd/spire/
  lint: go vet ./cmd/spire/

agent:
  model: claude-opus-4-6
  stale: 10m
  timeout: 15m

branch:
  base: main
  pattern: "feat/{bead-id}"

pr:
  auto-merge: false
  labels: ["agent-generated"]

context:
  - CLAUDE.md
  - SPIRE.md
  - docs/superpowers/specs/
